<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decoded, an Eddy's AI Lab game</title>
<style>
  :root{
    --bg:#0B0B0C; --panel:#141417; --panel-2:#1C1C21; --line:#2A2A31;
    --green:#C6FF3A; --green-dim:#8FBE1F; --white:#F5F7F2; --muted:#9A9AA3; --red:#FF5C5C; --amber:#FFB13A; --cyan:#3AE8FF;
    --radius:16px; --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --mono:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);background:var(--bg);color:var(--white);-webkit-font-smoothing:antialiased;min-height:100%;position:relative;overflow-x:hidden}

  /* moving code background */
  #codebg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  #codebg::after{content:'';position:absolute;inset:0;background:
    radial-gradient(900px 500px at 80% -10%, rgba(198,255,58,.10), transparent 60%),
    radial-gradient(700px 500px at 0% 110%, rgba(198,255,58,.06), transparent 55%)}
  #codebg .col{position:absolute;top:0;font-family:var(--mono);font-size:12.5px;line-height:1.85;color:var(--green);white-space:pre;opacity:.06;animation:scrollup linear infinite}
  @keyframes scrollup{from{transform:translateY(0)}to{transform:translateY(-50%)}}

  .wrap{position:relative;z-index:1;display:flex;justify-content:center;padding:22px 16px 64px}
  .app{width:100%;max-width:760px}

  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .mk{width:40px;height:42px;flex:0 0 auto}
  .brand h1{font-size:19px;letter-spacing:.16em;font-weight:800}
  .brand span{display:block;font-size:9.5px;letter-spacing:.22em;color:var(--muted);font-weight:600;margin-top:2px}
  .hud{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .chip{font-size:12.5px;color:var(--muted);background:rgba(20,20,23,.85);border:1px solid var(--line);padding:7px 12px;border-radius:999px;font-weight:700;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
  .chip b{color:var(--green)}
  .chip .amber{color:var(--amber)}

  .card{background:rgba(20,20,23,.9);backdrop-filter:blur(4px);border:1px solid var(--line);border-radius:var(--radius);padding:26px;animation:fadeUp .45s ease both}
  .card+.card{margin-top:16px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes popIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}

  /* lucide icon sizing */
  .emo{font-style:normal;line-height:1;display:inline-block;vertical-align:-.05em}
  .ico-lg .emo{font-size:22px}
  .ico-xl .emo{font-size:26px}

  .cta{margin-top:16px;background:linear-gradient(160deg,#12160b,#0e0e10);border:1px solid var(--green-dim);border-radius:16px;padding:20px;display:flex;gap:16px;align-items:center;position:relative;overflow:hidden}
  .cta::after{content:'';position:absolute;inset:0;background:radial-gradient(360px 120px at 100% 0,rgba(198,255,58,.12),transparent 60%);pointer-events:none}
  .cta .cta-mascot{width:56px;height:58px;flex:0 0 auto}
  .cta h3{font-size:16px;margin-bottom:4px;line-height:1.35}
  .cta p{color:var(--muted);font-size:13px;margin-bottom:12px}
  .cta a.btn{text-decoration:none}
  @media(max-width:560px){.cta{flex-direction:column;text-align:center}}
  hr{border:none;border-top:1px solid var(--line);margin:22px 0}
  .sharecard{margin-top:6px;animation:popIn .4s ease both}

  /* mascot */
  .mascot{display:block}
  .mascot .eyes{transform-box:fill-box;transform-origin:center}
  .mascot .blinker{transform-box:fill-box;transform-origin:center;animation:blink 4.2s ease-in-out infinite}
  .mascot.look .eyes{animation:look 5.4s ease-in-out infinite}
  @keyframes look{
    0%,9%{transform:translate(0,0)} 15%,23%{transform:translate(0,-5px)}
    29%,37%{transform:translate(0,5px)} 43%,51%{transform:translate(-6px,0)}
    57%,65%{transform:translate(6px,0)} 71%,100%{transform:translate(0,0)} }
  @keyframes blink{0%,92%,100%{transform:scaleY(1)} 96%{transform:scaleY(.12)}}
  .bob{animation:bob 2.3s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

  .ada{display:flex;gap:14px;align-items:flex-start;margin-bottom:18px}
  .ada .gm{flex:0 0 auto;width:46px;height:48px}
  .ada .bubble{background:var(--panel-2);border:1px solid var(--line);border-radius:14px;padding:12px 15px;font-size:14.5px;line-height:1.5;color:#e9ebe4;animation:popIn .4s ease both}
  .ada .bubble b{color:var(--green)}
  .who{font-size:10px;letter-spacing:.18em;color:var(--muted);font-weight:700;margin-bottom:5px}

  h2{font-size:22px;font-weight:800;letter-spacing:-.01em;margin-bottom:6px}
  .lead{color:var(--muted);font-size:14px;line-height:1.55;margin-bottom:16px}

  .howto{display:flex;gap:10px;align-items:center;background:rgba(198,255,58,.09);border:1px solid var(--green-dim);border-radius:12px;padding:12px 15px;font-size:14px;font-weight:600;color:#eaf3d6;margin:2px 0 18px}
  .howto .h{color:var(--green);display:inline-flex;flex:0 0 auto}

  .btn{appearance:none;border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:12px;padding:13px 20px;font-size:14.5px;transition:.15s;display:inline-flex;align-items:center;gap:8px}
  .btn.primary{background:var(--green);color:#0b0b0c}
  .btn.primary:hover{box-shadow:0 6px 26px rgba(198,255,58,.28);transform:translateY(-1px)}
  .btn.ghost{background:transparent;color:var(--white);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--green);color:var(--green)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
  .btn.big{padding:15px 26px;font-size:16px}
  .row{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;align-items:center}
  .spacer{flex:1}
  .linkbtn{background:none;border:none;color:var(--muted);font-family:inherit;font-size:12.5px;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:5px}
  .linkbtn:hover{color:var(--green)}

  .splash{text-align:center;padding:34px 22px}
  .splash .mascot{width:150px;height:158px;margin:0 auto}
  .splash h2{font-size:34px;letter-spacing:.14em;margin:22px 0 6px}
  .splash p{color:var(--muted);font-size:15px;max-width:430px;margin:0 auto 22px;line-height:1.5}

  .hero{display:flex;align-items:center;gap:18px;background:var(--panel-2);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:18px}
  .hero .mascot{width:66px;height:70px;flex:0 0 auto}
  .hero h2{margin:0 0 3px}
  .hero p{color:var(--muted);font-size:13px}

  .avatars{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:8px 0 4px}
  .av{background:var(--panel-2);border:2px solid var(--line);border-radius:16px;padding:20px 14px;cursor:pointer;transition:.15s;text-align:center}
  .av:hover{border-color:var(--green);transform:translateY(-3px)}
  .av.sel{border-color:var(--green);background:rgba(198,255,58,.08)}
  .av .mascot{width:96px;height:100px;margin:0 auto 8px}
  .av h3{font-size:18px;font-weight:800}
  .av p{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.4}

  .xpwrap{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:18px}
  .xprow{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:8px;align-items:center}
  .xprow b{color:var(--green)}
  .xpbar{height:9px;background:#0e0e10;border-radius:999px;overflow:hidden}
  .xpbar .f{height:100%;background:linear-gradient(90deg,var(--green-dim),var(--green));border-radius:999px;transition:width .8s cubic-bezier(.2,.8,.2,1)}

  .chapter{font-size:10.5px;letter-spacing:.2em;color:var(--muted);font-weight:800;margin:18px 0 8px;display:flex;align-items:center;gap:8px}
  .chapter::after{content:'';flex:1;height:1px;background:var(--line)}
  .levels{display:grid;gap:11px}
  .lvl{display:flex;align-items:center;gap:15px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px 17px;cursor:pointer;transition:.15s;animation:fadeUp .4s ease both}
  .lvl:hover:not(.locked){border-color:var(--green);transform:translateX(3px)}
  .lvl.locked{opacity:.5;cursor:not-allowed}
  .lvl .num{flex:0 0 auto;width:38px;height:38px;border-radius:10px;background:var(--panel-2);border:1px solid var(--line);display:grid;place-items:center;font-weight:800;font-size:15px;color:var(--muted)}
  .lvl.done .num{background:var(--green);color:#0b0b0c;border-color:var(--green)}
  .lvl.current .num{border-color:var(--green);color:var(--green)}
  .lvl .info{flex:1;min-width:0}
  .lvl .info h3{font-size:15px;font-weight:700;margin-bottom:2px}
  .lvl .info p{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lvl .status{font-size:10.5px;font-weight:800;letter-spacing:.06em;color:var(--muted);text-align:right;display:flex;align-items:center;gap:5px}
  .lvl.done .status{color:var(--green)}

  .opts{display:grid;gap:10px;margin:6px 0 4px}
  .opt{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;cursor:pointer;transition:.12s;font-size:14.5px;display:flex;align-items:center;gap:12px;animation:fadeUp .3s ease both}
  .opt:hover{border-color:var(--green)}
  .opt.correct{border-color:var(--green);background:rgba(198,255,58,.12)}
  .opt.wrong{border-color:var(--red);background:rgba(255,92,92,.1)}
  .opt .oi{color:var(--green);display:inline-flex;flex:0 0 auto}
  .tappable{position:relative}
  .tappable::after{content:'TAP';position:absolute;top:10px;right:12px;font-size:9px;letter-spacing:.15em;font-weight:800;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:2px 6px}
  .tappable:hover::after{color:var(--green);border-color:var(--green)}

  .prompt-q{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:16px;font-weight:700;font-size:16px;text-align:center;margin-bottom:6px;animation:popIn .35s ease both}

  .binrow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .bin{border:1px solid var(--line);border-radius:12px;padding:16px 14px;min-height:92px;background:var(--panel-2);cursor:pointer;transition:.12s;display:grid;place-items:center;text-align:center}
  .bin:hover{border-color:var(--green);background:rgba(198,255,58,.06)}
  .bin .bi{color:var(--green);margin-bottom:6px;display:inline-flex}
  .bin h4{font-size:13.5px;font-weight:800;margin-bottom:4px}
  .bin p{font-size:11.5px;color:var(--muted)}

  .bar{margin:9px 0}
  .bar .lab{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
  .bar .track{height:9px;background:var(--panel-2);border-radius:999px;overflow:hidden}
  .bar .fill{height:100%;background:var(--green);border-radius:999px;transition:width .8s cubic-bezier(.2,.8,.2,1)}
  .bar.dim .fill{background:var(--green-dim);opacity:.5}

  .chips{display:flex;flex-wrap:wrap;gap:9px;margin:4px 0 14px}
  .pchip{background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:10px 16px;font-size:13px;cursor:pointer;transition:.12s;font-weight:700;display:inline-flex;align-items:center;gap:7px}
  .pchip .oi{color:var(--green);display:inline-flex}
  .pchip:hover{border-color:var(--green)}
  .pchip.on{background:var(--green);color:#0b0b0c;border-color:var(--green)}
  .pchip.on .oi{color:#0b0b0c}
  .preview{background:#0e0e10;border:1px solid var(--line);border-radius:12px;padding:16px;font-size:14px;line-height:1.55;min-height:70px}
  .preview .ph{color:var(--muted)}
  .meter{height:10px;background:var(--panel-2);border-radius:999px;overflow:hidden;margin:14px 0 6px}
  .meter .fill{height:100%;width:8%;background:linear-gradient(90deg,var(--green-dim),var(--green));transition:width .5s}
  .meterlab{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}

  .tools{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:4px 0 16px}
  .tool{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:13px 14px;cursor:pointer;display:flex;gap:11px;align-items:center;transition:.12s}
  .tool:hover{border-color:var(--green)}
  .tool.on{border-color:var(--green);background:rgba(198,255,58,.08)}
  .tool .ic{color:var(--green);display:inline-flex}
  .tool small{display:block;color:var(--muted);font-size:11.5px}
  .log{background:#0e0e10;border:1px solid var(--line);border-radius:12px;padding:8px 14px;margin-top:6px}
  .log .line{padding:9px 0;font-size:13.5px;border-bottom:1px solid var(--line);opacity:0;transform:translateY(6px);animation:pop .35s forwards;display:flex;align-items:center;gap:9px}
  .log .line:last-child{border-bottom:none}
  .log .line .li{flex:0 0 auto;display:inline-flex}
  .log .line.ok .li{color:var(--green)}
  .log .line.fail .li{color:var(--red)}
  @keyframes pop{to{opacity:1;transform:none}}

  /* order game */
  .orderpool{display:grid;gap:10px;margin-top:4px}
  .ostep{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;cursor:pointer;transition:.12s;display:flex;align-items:center;gap:12px;font-size:14.5px}
  .ostep:hover:not(.picked){border-color:var(--green)}
  .ostep .si{color:var(--green);display:inline-flex}
  .ostep.picked{opacity:.5;pointer-events:none}
  .ostep .badge{margin-left:auto;background:var(--green);color:#0b0b0c;font-weight:800;font-size:12px;width:24px;height:24px;border-radius:50%;display:grid;place-items:center}

  .feedback{border-radius:12px;padding:13px 16px;font-size:14px;line-height:1.5;margin-top:14px;display:none}
  .feedback.show{display:block;animation:popIn .3s ease both}
  .feedback.good{background:rgba(198,255,58,.1);border:1px solid var(--green-dim)}
  .feedback.bad{background:rgba(255,92,92,.08);border:1px solid var(--red)}
  .feedback .pts{color:var(--green);font-weight:800;display:inline-flex;align-items:center;gap:4px}

  .reveal{border:1px solid var(--green-dim);background:rgba(198,255,58,.06);border-radius:14px;padding:20px;margin-top:8px}
  .reveal .kicker{font-size:11px;letter-spacing:.2em;color:var(--green);font-weight:800;margin-bottom:8px}
  .reveal h3{font-size:19px;margin-bottom:8px}
  .reveal p{font-size:14.5px;line-height:1.6;color:#e5e7df}
  .ptsline{background:var(--panel-2);border:1px solid var(--green-dim);border-radius:12px;padding:12px 15px;margin-top:14px;font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:8px}
  .ptsline b{color:var(--green)}
  .ptsline .pi{color:var(--green);display:inline-flex}
  .nudge{font-size:13.5px;color:var(--green);font-weight:700;margin-top:12px;display:flex;align-items:center;gap:7px}

  .gcard{background:linear-gradient(160deg,#181c11,#0f120b);border:1px solid var(--green-dim);border-radius:16px;padding:22px;margin-top:14px;position:relative;overflow:hidden}
  .gcard::after{content:'';position:absolute;inset:0;background:radial-gradient(400px 120px at 90% 0,rgba(198,255,58,.14),transparent 60%)}
  .gcard .tagline{font-size:10px;letter-spacing:.24em;color:var(--green);font-weight:800;display:flex;align-items:center;gap:6px}
  .gcard h3{font-size:21px;margin:6px 0 8px}
  .gcard p{font-size:14px;line-height:1.55;color:#dfe2d8}

  .deck{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
  @media(max-width:560px){.deck{grid-template-columns:1fr}.binrow{grid-template-columns:1fr}.tools{grid-template-columns:1fr}.avatars{grid-template-columns:1fr}}
  .deck .g{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:14px}
  .deck .g b{color:var(--green);font-size:13.5px}
  .deck .g p{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.45}

  .cert{text-align:center;padding:30px 22px}
  .cert .mascot{width:96px;height:100px;margin:0 auto 12px}
  .cert h2{font-size:26px}
  .cert .big-score{font-size:44px;font-weight:800;color:var(--green);margin:6px 0;display:flex;align-items:center;justify-content:center;gap:10px}
  .cert .rank{font-size:13px;letter-spacing:.14em;color:var(--muted);font-weight:700}
  .pillrow{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin:16px 0}
  .pill{font-size:11px;background:var(--panel);border:1px solid var(--green-dim);color:var(--green);padding:6px 11px;border-radius:999px;font-weight:700}

  /* leaderboard */
  .lb{display:grid;gap:9px;margin-top:8px}
  .lbrow{display:flex;align-items:center;gap:14px;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:13px 16px;animation:fadeUp .35s ease both}
  .lbrow.you{border-color:var(--green);background:rgba(198,255,58,.08)}
  .lbrow .rk{width:26px;font-weight:800;color:var(--muted);text-align:center;flex:0 0 auto}
  .lbrow.top1 .rk,.lbrow.top2 .rk,.lbrow.top3 .rk{color:var(--green)}
  .lbrow .nm{flex:1;font-weight:700;letter-spacing:.04em}
  .lbrow .sc{font-weight:800;color:var(--green);display:inline-flex;align-items:center;gap:5px}
  .lbrow .rankname{font-size:11px;color:var(--muted);font-weight:600}
  .addbox{display:flex;gap:10px;margin-top:14px}
  .addbox input{flex:1;background:#0e0e10;border:1px solid var(--line);border-radius:10px;padding:12px 14px;color:var(--white);font-family:inherit;font-size:14px;text-transform:uppercase;letter-spacing:.1em}
  .addbox input:focus{outline:none;border-color:var(--green)}

  .foot{text-align:center;color:var(--muted);font-size:11.5px;margin-top:26px;letter-spacing:.04em}

  #burst{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:50;pointer-events:none;display:flex;flex-direction:column;gap:6px;align-items:center}
  .pop-pts{background:var(--green);color:#0b0b0c;font-weight:800;font-size:15px;padding:7px 14px;border-radius:999px;box-shadow:0 6px 24px rgba(198,255,58,.4);animation:rise 1s ease forwards;display:inline-flex;align-items:center;gap:5px}
  @keyframes rise{0%{opacity:0;transform:translateY(8px) scale(.9)}20%{opacity:1;transform:none}80%{opacity:1}100%{opacity:0;transform:translateY(-14px)}}
</style>
</head>
<body>
<div id="codebg"></div>
<div id="burst"></div>
<div class="wrap">
<div class="app">
  <div class="top">
    <div class="brand">
      <div class="mk" id="hdrMark"></div>
      <div><h1>DECODED</h1><span>BY EDDY'S AI LAB</span></div>
    </div>
    <div class="hud" id="hud"></div>
  </div>
  <div id="screen"></div>
  <div class="foot">Prototype build, single file, nothing you do here leaves this page</div>
</div>
</div>

<script>
/* ---------------- moving code background ---------------- */
(function buildCodeBg(){
  const snippets=[
    "const model = train(data);","if (prompt) generate(reply);","for (let i=0;i<tokens;i++)",
    "predict(next_word);","embedding = encode(text);","loss = compare(pred, truth);",
    "weights += learningRate * grad;","agent.use(tool);","while (!done) step();",
    "def learn(x): return f(x*w+b)","output = softmax(logits);","verify(fact) or flag();",
    "prompt = role + task + format;","context.append(memory);","score += reward;",
    "if (confidence < 0.5) checkSource();","return bestGuess(options);","render(ui, state);",
    "data = clean(raw);","policy.review(system);","risk = assess(bias);","opportunity.unlock();"
  ];
  function block(n){let s='';for(let i=0;i<n;i++){s+=snippets[Math.floor(Math.random()*snippets.length)]+"\n";}return s;}
  const bg=document.getElementById('codebg');
  const cols=[{left:'4%',dur:70},{left:'30%',dur:95},{left:'58%',dur:82},{left:'84%',dur:110}];
  cols.forEach(c=>{
    const d=document.createElement('div');
    d.className='col'; d.style.left=c.left; d.style.animationDuration=c.dur+'s';
    const body=block(40); d.textContent=body+body; bg.appendChild(d);
  });
})();

/* ---------------- emoji icons ---------------- */
const EMO={
  star:'⭐', flame:'🔥', 'layout-grid':'🎮', 'arrow-right':'➡️', 'arrow-left':'⬅️',
  'circle-check':'✅', lock:'🔒', check:'✅', x:'❌', trophy:'🏆', 'refresh-cw':'🔄',
  'trending-up':'📈', sparkles:'✨', 'hand-pointer':'👇', settings:'⚙️', brain:'🧠',

  const x=cv.getContext('2d'), cols=['#C6FF3A','#F5F7F2','#3AE8FF','#8FBE1F'], P=[], cx=innerWidth/2;
  for(let i=0;i<100;i++){ P.push({x:cx+(Math.random()-0.5)*220, y:innerHeight*0.26, vx:(Math.random()-0.5)*11, vy:Math.random()*-9-4, g:0.34, s:4+Math.random()*6, c:cols[i%cols.length], r:Math.random()*6, vr:(Math.random()-0.5)*0.45}); }

  {term:"Large Language Model", def:"An AI like ChatGPT that works by predicting the most likely next word over and over. It is a very good guesser, not a mind."},
  {term:"Hallucination", def:"When an AI states something false with total confidence. Confident does not mean correct, so verify anything that matters."},
  {term:"Prompt Engineering", def:"The skill of asking clearly. Give the AI a role, specifics, a format, and an audience, and the output transforms."},
  {term:"AI Agent", def:"An LLM given a goal plus tools like search, calendar, and email, which it uses across several steps to actually get things done."},
  {term:"Vibe Coding", def:"Building software by describing what you want in plain language and letting AI write and fix the code, so you can create without coding line by line."},

/* ---------------- generic multiple choice engine ---------------- */
function mcLevel(i, cfg){
  let idx=0, correct=0;
  levelShell(i, cfg.ada, cfg.howtoIcon, cfg.howto, `<div id="q"></div>`);
  const q=document.getElementById('q');
  function step(){
    if(idx>=cfg.questions.length) return done();
    const Q=cfg.questions[idx];
    q.innerHTML=`
      <div class="prompt-q">${Q.q}</div>
      <div class="opts" id="opts">${Q.options.map((o,k)=>`<div class="opt tappable" data-k="${k}" style="animation-delay:${k*0.04}s">${o.icon?`<span class="oi">${I(o.icon)}</span>`:''}${o.t}</div>`).join('')}</div>
      <div class="feedback" id="fb"></div>
      <div class="who" style="margin-top:12px">QUESTION ${idx+1} OF ${cfg.questions.length}</div>`;
    icons();
    q.querySelectorAll('#opts .opt').forEach(o=>{
      o.onclick=()=>{
        const k=+o.dataset.k, ok=!!Q.options[k].ok; if(ok)correct++;
        const pts=award(ok, cfg.base||10);
        q.querySelectorAll('#opts .opt').forEach((x,j)=>{x.style.pointerEvents='none'; if(Q.options[j].ok)x.classList.add('correct'); else if(j===k&&!ok)x.classList.add('wrong');});
        const fb=document.getElementById('fb');
        fb.className='feedback show '+(ok?'good':'bad');
        fb.innerHTML=(ok?`<span class="pts">${I('check')} +${pts}</span> `:``)+Q.explain;
        fb.appendChild(el(`<div class="row" style="margin-top:12px"><button class="btn primary" id="cont">Continue</button></div>`));
        icons();
        document.getElementById('cont').onclick=()=>{ idx++; step(); };
      };
    });
  }
  function done(){ q.innerHTML=finishBlock(i, cfg.reveal(correct, cfg.questions.length)); icons(); wireFinish(i); }
  step();
}

/* ---------------- LEVEL 1 ---------------- */
function L1(){
  const items=[
    {t:"A calculator adding 2 plus 2", learns:false},
    {t:"Spotify guessing songs you will love", learns:true},

    {t:"Your phone recognising your face", learns:true},
    {t:"A thermostat switching on at 68 degrees", learns:false},
    {t:"Your inbox filtering out spam", learns:true}
  ];
  let idx=0, scoreR=0;
  levelShell(0,
    `Ask one question for each item. Did a person write an exact rule for it, or did it figure it out from examples?`,
    'hand-pointer',
    `Read the item, then tap the box it belongs in. You earn <b>10 points</b> per correct sort.`,
    `<div id="q"></div>`);

    if(idx>=items.length) return done();

      <div class="prompt-q">${it.t}</div>
      <div class="binrow">
        <div class="bin" data-a="false"><div><span class="bi ico-lg">${I('settings')}</span><h4>Follows rules</h4><p>a human wrote exactly what to do</p></div></div>
        <div class="bin" data-a="true"><div><span class="bi ico-lg">${I('brain')}</span><h4>Learns from examples</h4><p>it figured it out itself</p></div></div>
      </div>
      <div class="feedback" id="fb"></div>
      <div class="who" style="margin-top:12px">ITEM ${idx+1} OF ${items.length}</div>`;
    icons();
    q.querySelectorAll('.bin').forEach(b=>{
      b.onclick=()=>{
        const ans=b.dataset.a==='true', ok=ans===it.learns; if(ok)scoreR++;
        const pts=award(ok,10);
        q.querySelectorAll('.bin').forEach(x=>x.style.pointerEvents='none');
        const fb=document.getElementById('fb'); fb.className='feedback show '+(ok?'good':'bad');
        fb.innerHTML=(ok?`<span class="pts">${I('check')} +${pts}</span> `:``)+(ok?`<b>${it.learns?'It learned this from many examples.':'A person wrote this exact rule.'}</b>`:`Not quite. This one <b>${it.learns?'learns from examples':'just follows a fixed rule'}</b>.`);
        icons();
        setTimeout(()=>{idx++;step();},1000);
      };
    });
  }
  function done(){
    q.innerHTML=finishBlock(0,`
      <div class="kicker">WHAT JUST HAPPENED</div>
      <h3>The learns from examples pile is AI</h3>
      <p>You got <b>${scoreR}/${items.length}</b>. Everything in that pile shares one thing. Nobody wrote a rule for every face or every spam email. The system studied thousands of examples and learned the pattern itself. That is <b>Machine Learning</b>, the engine under almost everything people call AI.</p>`);
    icons(); wireFinish(0);
  }
  step();
}

/* ---------------- LEVEL 2 ---------------- */
function L2(){
  const train=[{show:"apple"},{show:"banana"},{show:"apple"},{show:"banana"},{show:"apple"},{show:"banana"}];
  let idx=0, correct=0;
  levelShell(1,
    `You are the teacher now. Tag each fruit. The quality of your labels decides how smart your model turns out.`,
    'hand-pointer',
    `Tap the correct label for each fruit to build your training data. You earn <b>10 points</b> per correct label.`,
    `<div id="q"></div>`);
  const q=document.getElementById('q');
  function step(){
    if(idx>=train.length) return test();
    const it=train[idx];
    q.innerHTML=`
      <div style="text-align:center;margin:14px 0"><span style="color:var(--green);font-size:52px;display:inline-flex">${it.show==='apple'?I('apple'):I('banana')}</span></div>
      <p class="lead" style="text-align:center">What is this? Tap to add the label.</p>
      <div class="opts">
        <div class="opt tappable" data-a="apple"><span class="oi">${I('apple')}</span> Apple</div>
        <div class="opt tappable" data-a="banana"><span class="oi">${I('banana')}</span> Banana</div>
      </div>
      <div class="who" style="margin-top:10px">TRAINING EXAMPLE ${idx+1} OF ${train.length}</div>`;
    icons();
    q.querySelectorAll('.opt').forEach(o=>{ o.onclick=()=>{ const ok=o.dataset.a===it.show; if(ok)correct++; award(ok,10); idx++; step(); }; });
  }
  function test(){
    const acc=Math.round(correct/train.length*100);
    const testItems=["apple","banana","apple","banana"];
    q.innerHTML=`<p class="lead">Training done. Your model now meets <b>4 brand new fruits</b> it has never seen.</p><div class="log" id="tl"></div><div id="after"></div>`;
    const tl=document.getElementById('tl');
    testItems.forEach((f,k)=>{ setTimeout(()=>{
      const right=(Math.random()*100)<acc, guess=right?f:(f==='apple'?'banana':'apple');
      tl.appendChild(el(`<div class="line ${right?'ok':'fail'}"><span class="li">${I(right?'check':'x')}</span> Sees ${f}, predicts ${guess}</div>`));
      icons();
      if(k===testItems.length-1) setTimeout(after,450);
    },520*(k+1)); });
    function after(){
      document.getElementById('after').innerHTML=finishBlock(1,`
        <div class="kicker">WHAT JUST HAPPENED</div>
        <h3>Your labels became your model's intelligence</h3>
        <p>Your training was <b>${acc}% accurate</b>, so your model landed around <b>${acc}%</b> on new fruit too. It never understood apples. It copied the patterns in the examples you gave it. That is why data matters more than almost anything. Feed a model biased or sloppy examples and it will confidently repeat your mistakes. Garbage in, garbage out.</p>`);
      icons(); wireFinish(1);
    }
  }
  step();
}

  levelShell(2,

    `<div id="q"></div>`);

    q.innerHTML=`

      <div class="opts" id="picks">${r.opts.map((o,k)=>`<div class="opt tappable" data-k="${k}"><span class="oi">${I('message-square')}</span>${o[0]}</div>`).join('')}</div>
      <div id="fb"></div>
      <div class="who" style="margin-top:10px">SENTENCE ${idx+1} OF ${rounds.length}</div>`;
    icons();

    q.querySelectorAll('#picks .opt').forEach(o=>{

        fb.innerHTML=`<div class="feedback show ${ok?'good':'bad'}">${ok?`<span class="pts">${I('check')} +${pts}</span> You matched the AI's top pick.`:`The AI would most likely say <b>${r.opts[top][0]}</b>.`}</div>
          <div style="margin-top:14px">${r.opts.map((o,j)=>`<div class="bar ${j===top?'':'dim'}"><div class="lab"><span>${o[0]}</span><span>${o[1]}%</span></div><div class="track"><div class="fill" style="width:0"></div></div></div>`).join('')}</div>
          <div class="row" style="margin-top:12px"><button class="btn primary" id="cont">Continue</button></div>`;
        icons();
        setTimeout(()=>fb.querySelectorAll('.fill').forEach((f,j)=>f.style.width=r.opts[j][1]+'%'),60);
        document.getElementById('cont').onclick=()=>{idx++;step();};
      };
    });
  }
  function done(){
    q.innerHTML=finishBlock(2,`
      <div class="kicker">WHAT JUST HAPPENED</div>
      <h3>A language model is a next word prediction machine</h3>
      <p>You matched the AI on <b>${hits}/${rounds.length}</b>. A <b>Large Language Model</b>, the tech behind ChatGPT, Claude, and Gemini, does exactly what you just did. It looks at the words so far, picks the most likely next one, then repeats. It read a huge chunk of the internet to get good at it. Powerful, but it is guessing, not knowing. That is why the next level matters.</p>`);
    icons(); wireFinish(2);
  }

}

function rr(x,l,t,w,h,r){ x.moveTo(l+r,t); x.arcTo(l+w,t,l+w,t+h,r); x.arcTo(l+w,t+h,l,t+h,r); x.arcTo(l,t+h,l,t,r); x.arcTo(l,t,l+w,t,r); }
function drawMascot(x,cx,cy,s,guide){
  const leo=guide==='leo', col=leo?'#3AE8FF':'#C6FF3A';
  const px=v=>cx+(v-100)*s, py=v=>cy+(v-116)*s, T=2*Math.PI;
  x.fillStyle=col; x.strokeStyle=col; x.lineCap='round';
  x.lineWidth=8*s; x.beginPath();
  if(leo){ x.moveTo(px(122),py(54)); x.quadraticCurveTo(px(136),py(30),px(141),py(22)); }
  else { x.moveTo(px(78),py(54)); x.quadraticCurveTo(px(64),py(30),px(59),py(22)); }
  x.stroke();
  x.beginPath(); if(leo){ rr(x,px(132),py(8),18*s,18*s,4*s); } else { x.arc(px(56),py(18),12*s,0,T); } x.fill();
  if(leo){ x.beginPath(); rr(x,px(19),py(103),12*s,27*s,6*s); x.fill(); x.beginPath(); rr(x,px(169),py(103),12*s,27*s,6*s); x.fill(); }
  x.beginPath(); x.arc(cx,cy,72*s,0,T); x.fill();
  x.fillStyle='#0B0B0C'; x.beginPath(); x.ellipse(px(100),py(127),50*s,32*s,0,0,T); x.fill();
  x.fillStyle=col; x.beginPath(); x.arc(px(84),py(126),9.5*s,0,T); x.fill(); x.beginPath(); x.arc(px(116),py(126),9.5*s,0,T); x.fill();
}
function buildShareCanvas(){
  const cv=document.createElement('canvas'); cv.width=1080; cv.height=1080;
  const x=cv.getContext('2d');
  x.fillStyle='#0B0B0C'; x.fillRect(0,0,1080,1080);
  const g=x.createRadialGradient(820,180,50,820,180,760); g.addColorStop(0,'rgba(198,255,58,0.18)'); g.addColorStop(1,'rgba(198,255,58,0)');
  x.fillStyle=g; x.fillRect(0,0,1080,1080);
  x.strokeStyle='#2A2A31'; x.lineWidth=4; x.strokeRect(42,42,996,996);
  drawMascot(x,540,278,1.85,S.guide);
  x.textAlign='center';
  x.fillStyle='#F5F7F2'; x.font='800 66px Inter,Arial,sans-serif'; x.fillText('DECODED',540,470);
  x.fillStyle='#9A9AA3'; x.font='700 22px Inter,Arial'; x.fillText("BY EDDY'S AI LAB",540,506);
  x.fillStyle='#C6FF3A'; x.font='800 150px Inter,Arial'; x.fillText(String(S.score),540,690);
  x.fillStyle='#9A9AA3'; x.font='700 30px Inter,Arial'; x.fillText('POINTS   RANK '+rankFor(S.score),540,742);
  x.fillStyle='#F5F7F2'; x.font='700 44px Inter,Arial'; x.fillText('I decoded AI. Can you?',540,858);
  x.fillStyle='#C6FF3A'; x.font='800 36px Inter,Arial'; x.fillText('Play free at www.eddysailab.com',540,958);
  return cv;
}
function downloadShare(){
  window._shareCv.toBlob(b=>{ const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download='decoded-score.png'; a.click(); setTimeout(()=>URL.revokeObjectURL(u),2000); });
}
function shareResult(){
  const text=`I scored ${S.score} on Decoded and reached rank ${rankFor(S.score)}. Can you beat me? Play free at www.eddysailab.com`;
  try{
    window._shareCv.toBlob(async b=>{
      const file=new File([b],'decoded-score.png',{type:'image/png'});
      if(navigator.canShare && navigator.canShare({files:[file]})){ try{ await navigator.share({files:[file],text,title:'Decoded'}); }catch(e){} }
      else if(navigator.share){ try{ await navigator.share({text,title:'Decoded',url:'https://www.eddysailab.com'}); }catch(e){} }
      else { downloadShare(); }
    });
  }catch(e){ downloadShare(); }
}

/* ---------------- email capture ----------------
   To collect emails for real, paste your form endpoint below
   (Formspree, ConvertKit, Mailchimp, etc). Leave blank to just
   store locally during the prototype. */
const FORM_ENDPOINT='';
function submitEmail(){
  const inp=document.getElementById('email'); const v=(inp.value||'').trim();
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v)){ inp.style.borderColor='var(--red)'; inp.focus(); return; }
  S.email=v; save();
  if(FORM_ENDPOINT){ try{ fetch(FORM_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json',Accept:'application/json'},body:JSON.stringify({email:v,score:S.score,rank:rankFor(S.score)})}).catch(()=>{}); }catch(e){} }
  showEmailDone();
}
function showEmailDone(){
  const w=document.getElementById('emailWrap');
  if(w) w.innerHTML=`<div class="reveal"><div class="kicker">${I('circle-check')} YOU ARE IN</div><h3>Your next step is on the way</h3><p>Thanks for playing. Keep going with deeper AI training at <a href="https://www.eddysailab.com" target="_blank" rel="noopener" style="color:var(--green);font-weight:700">www.eddysailab.com</a>.</p></div>`;
}

/* ---------------- certificate ---------------- */
function renderCert(){
  const deck=GLOSSARY.map(g=>`<div class="g"><b>${g.term}</b><p>${g.def}</p></div>`).join('');
  screen.innerHTML=`
    <div class="card cert">
      ${mascot(S.guide,'bob')}
      <div class="who" style="text-align:center">CERTIFIED BY EDDY'S AI LAB</div>
      <h2>You have Decoded AI</h2>
      <div class="big-score">${I('star')} ${S.score}</div>
      <div class="rank">RANK, ${rankFor(S.score)}${S.bestStreak>=3?`, BEST STREAK ${S.bestStreak}`:''}</div>
      <div class="pillrow">${GLOSSARY.map(g=>`<span class="pill">${g.term}</span>`).join('')}</div>
      <p class="lead" style="text-align:center;max-width:470px;margin:6px auto 0">You now understand, in plain English, what AI is, how it learns and guesses, why it makes things up, how to talk to it, how to build with it, how to use it responsibly, and its risks, opportunities, and rules. That is more than most people can say.</p>
      <div class="row" style="justify-content:center;margin-top:18px"><button class="btn primary" id="addlb">${I('trophy')} Add my score to the leaderboard</button></div>
    </div>
    <div class="card">
      <h2>Share your result</h2>
      <p class="lead">Post it and challenge a friend to beat your score.</p>
      <div class="sharecard" id="sharePreview"></div>
      <div class="row" style="justify-content:center;margin-top:14px"><button class="btn primary" id="dl">${I('download')} Download image</button><button class="btn ghost" id="sh">${I('share')} Share</button></div>
      <hr>
      <div id="emailWrap">
        <h2>Get your free AI starter guide</h2>
        <p class="lead">Drop your email and we will send your next step, deeper AI training from Eddy's AI Lab.</p>
        <div class="addbox"><input id="email" type="email" placeholder="you@email.com"><button class="btn primary" id="subEmail">Send it to me</button></div>
      </div>
    </div>
    <div class="card">
      ${ada(`Proud of you. Replay any level to push your score higher, or start fresh.`)}
      <h2 style="margin-bottom:2px">Your AI concept deck</h2>
      <p class="lead">Eleven ideas, plain English, yours to keep.</p>
      <div class="deck">${deck}</div>
      <div class="row" style="margin-top:20px">
        <button class="btn primary" id="replay">Back to the map</button>
        <button class="btn ghost" id="reset">Reset everything</button>
      </div>
      ${ctaBlock()}
    </div>`;
  icons();
  const cv=buildShareCanvas(); window._shareCv=cv;
  cv.style.width='100%'; cv.style.maxWidth='320px'; cv.style.display='block'; cv.style.margin='0 auto'; cv.style.borderRadius='14px'; cv.style.border='1px solid var(--line)';
  const sp=document.getElementById('sharePreview'); if(sp) sp.appendChild(cv);
  const dl=document.getElementById('dl'); if(dl) dl.onclick=downloadShare;
  const sh=document.getElementById('sh'); if(sh) sh.onclick=shareResult;
  const se=document.getElementById('subEmail'); if(se) se.onclick=submitEmail;
  if(S.email) showEmailDone();
  document.getElementById('addlb').onclick=()=>renderBoard(true);
  document.getElementById('replay').onclick=renderMap;
  document.getElementById('reset').onclick=()=>{ const keep=S.board; Object.assign(S,FRESH,{done:Array(N).fill(false),board:keep}); save(); boot(); };
}

/* ---------------- leaderboard ---------------- */
function renderBoard(addMode){
  const board=boardList().slice().sort((a,b)=>b.score-a.score);
  function rowsHtml(){
    return board.map((e,k)=>`<div class="lbrow ${e.you?'you':''} ${k<3?('top'+(k+1)):''}">
      <div class="rk">${k===0?I('crown'):(k+1)}</div>
      <div class="nm">${e.name}${e.you?' (you)':''}<div class="rankname">${rankFor(e.score)}</div></div>
      <div class="sc">${I('star')} ${e.score}</div></div>`).join('');
  }
  screen.innerHTML=`
    <div class="card">
      <div class="row" style="margin:0 0 14px"><button class="btn ghost" id="back">${I('arrow-left')} Map</button><div class="spacer"></div><div class="chip">${I('trophy')} Leaderboard</div></div>
      <h2>Leaderboard</h2>
      <p class="lead">Top decoders at Eddy's AI Lab. ${addMode?'Add your initials to take your spot.':'Finish the game to add your score.'}</p>
      <div class="lb" id="lb">${rowsHtml()}</div>
      ${addMode?`<div class="addbox"><input id="ini" maxlength="8" placeholder="YOUR NAME"><button class="btn primary" id="submit">${I('plus')} Add ${S.score}</button></div>`:''}
      <div class="row" style="margin-top:16px"><button class="btn ghost" id="home">Back to map</button></div>
    </div>`;
  icons();
  document.getElementById('back').onclick=renderMap;
  document.getElementById('home').onclick=renderMap;
  if(addMode){
    const submit=document.getElementById('submit'), ini=document.getElementById('ini');
    submit.onclick=()=>{
      const name=(ini.value||'YOU').toUpperCase().slice(0,8);
      board.forEach(e=>{ delete e.you; });
      S.board.push({name, score:S.score, you:true}); save();
      renderBoard(false);
    };
  }
}

/* ---------------- boot ---------------- */
boot();
</script>
