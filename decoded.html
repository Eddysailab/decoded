<script>
/* ============================================================================
   DECODED - MASCOT
   ----------------------------------------------------------------------------
   Builds the robot head as inline SVG so it can animate.
     - Ada: neon green, antenna to the upper-left ending in a round ball.
            This is the exact attached character and the official app logo.
     - Leo: cyan variant, antenna mirrored to the upper-right with a square tip,
            plus small headphone pads on the left and right of the head.

   Animations (blink, look, bob) are CSS classes defined in css/styles.css.
   Pass animate:false for a still version (used when reduced motion is on).
   ============================================================================ */

window.DECODED = window.DECODED || {};

(function () {
  var uid = 0;

  DECODED.mascotSVG = function (guideId, opts) {
    opts = opts || {};
    var g = DECODED.guides[guideId] || DECODED.guides.ada;
    var color = g.color;
    var animate = opts.animate !== false;
    var size = opts.size || 120;
    var id = "m" + (uid++);
    var isLeo = guideId === "leo";

    var bobClass = animate ? "dc-bob" : "";
    var eyesClass = animate ? "dc-eyes" : "";
    var eyeClass = animate ? "dc-eye" : "";

    // Antenna differs per guide.
    var antenna;
    if (isLeo) {
      // Upper-right stalk ending in a small square tip.
      antenna =
        '<path d="M124 58 Q138 44 143 32" stroke="' + color + '" stroke-width="9" stroke-linecap="round" fill="none"/>' +
        '<rect x="135" y="20" width="20" height="20" rx="4" fill="' + color + '" transform="rotate(12 145 30)"/>';
    } else {
      // Upper-left stalk ending in a round ball.
      antenna =
        '<path d="M76 58 Q62 44 58 32" stroke="' + color + '" stroke-width="9" stroke-linecap="round" fill="none"/>' +
        '<circle cx="55" cy="30" r="12" fill="' + color + '"/>';
    }

    // Headphone pads only on Leo.
    var pads = "";
    if (isLeo) {
      pads =
        '<rect x="20" y="96" width="16" height="36" rx="8" fill="' + g.dim + '"/>' +
        '<rect x="164" y="96" width="16" height="36" rx="8" fill="' + g.dim + '"/>';
    }

    return '' +
      '<svg class="dc-mascot" viewBox="0 0 200 210" width="' + size + '" height="' + (size * 1.05) +
        '" role="img" aria-label="' + g.name + ' the Decoded mascot" xmlns="http://www.w3.org/2000/svg">' +
        '<defs>' +
          '<radialGradient id="' + id + 'head" cx="42%" cy="34%" r="72%">' +
            '<stop offset="0%" stop-color="' + lighten(color) + '"/>' +
            '<stop offset="100%" stop-color="' + color + '"/>' +
          '</radialGradient>' +
        '</defs>' +
        '<g class="' + bobClass + '">' +
          pads +
          antenna +
          // Head
          '<circle cx="100" cy="114" r="72" fill="url(#' + id + 'head)"/>' +
          // Visor
          '<ellipse cx="100" cy="116" rx="46" ry="31" fill="#080809"/>' +
          // Eyes (wrapped for the look shift; each eye squashes for the blink)
          '<g class="' + eyesClass + '">' +
            '<circle class="' + eyeClass + '" cx="83" cy="116" r="9.5" fill="' + color + '"/>' +
            '<circle class="' + eyeClass + '" cx="117" cy="116" r="9.5" fill="' + color + '"/>' +
          '</g>' +
        '</g>' +
      '</svg>';
  };

  // Small helper to nudge a hex color lighter for the head highlight.
  function lighten(hex) {
    var c = hex.replace("#", "");
    var r = parseInt(c.substring(0, 2), 16);
    var gr = parseInt(c.substring(2, 4), 16);
    var b = parseInt(c.substring(4, 6), 16);
    r = Math.min(255, Math.round(r + (255 - r) * 0.28));
    gr = Math.min(255, Math.round(gr + (255 - gr) * 0.28));
    b = Math.min(255, Math.round(b + (255 - b) * 0.28));
    return "rgb(" + r + "," + gr + "," + b + ")";
  }
})();
</script>
<script>
/* ============================================================================
   DECODED - STATE
   ----------------------------------------------------------------------------
   All player progress lives in the browser via localStorage. This module is the
   single place that reads and writes it, so a real backend can be added later
   without touching game logic: swap the load/save internals for API calls.
   ============================================================================ */

window.DECODED = window.DECODED || {};

(function () {
  var PREFIX = DECODED.config.STORAGE_PREFIX;
  var KEY = PREFIX + "state";

  function defaults() {
    return {
      guide: null,           // "ada" | "leo"
      score: 0,
      streak: 0,             // current streak, resets only on a wrong answer
      bestStreak: 0,
      completed: [],         // array of level nums finished
      unlockedGlossary: [],  // array of glossary ids
      email: null,           // captured email (local copy)
      certificateSeen: false,
      theme: "dark",         // "dark" | "light"
      user: null             // signed-in Google user (when sign-in is enabled)
    };
  }

  var state = load();

  function load() {
    try {
      var raw = localStorage.getItem(KEY);
      if (!raw) return defaults();
      var parsed = JSON.parse(raw);
      var base = defaults();
      for (var k in base) {
        if (parsed[k] !== undefined) base[k] = parsed[k];
      }
      return base;
    } catch (e) {
      return defaults();
    }
  }

  function save() {
    try {
      localStorage.setItem(KEY, JSON.stringify(state));
    } catch (e) { /* storage may be full or blocked; game still runs in memory */ }
  }

  DECODED.state = {
    get: function () { return state; },

    setGuide: function (id) { state.guide = id; save(); },

    addScore: function (n) { state.score += n; save(); return state.score; },

    // Streak increases on each correct answer and resets only on a wrong one.
    bumpStreak: function () {
      state.streak += 1;
      if (state.streak > state.bestStreak) state.bestStreak = state.streak;
      save();
      return state.streak;
    },
    resetStreak: function () { state.streak = 0; save(); },

    isCompleted: function (num) { return state.completed.indexOf(num) !== -1; },

    completeLevel: function (num, glossaryId) {
      if (state.completed.indexOf(num) === -1) state.completed.push(num);
      if (glossaryId && state.unlockedGlossary.indexOf(glossaryId) === -1) {
        state.unlockedGlossary.push(glossaryId);
      }
      save();
    },

    // A level is unlocked if it is level 1, already done, or the previous is done.
    isUnlocked: function (num) {
      if (num <= 1) return true;
      if (this.isCompleted(num)) return true;
      return this.isCompleted(num - 1);
    },

    setEmail: function (email) { state.email = email; save(); },

    setTheme: function (theme) { state.theme = theme; save(); },

    setUser: function (user) { state.user = user; save(); },
    clearUser: function () { state.user = null; save(); },

    markCertificateSeen: function () { state.certificateSeen = true; save(); },

    // Reset progress and score, but keep the player's account and theme choice.
    reset: function () {
      var keepTheme = state.theme, keepUser = state.user;
      state = defaults();
      state.theme = keepTheme;
      state.user = keepUser;
      save();
    }
  };
})();
</script>
<script>
/* ============================================================================
   DECODED - AUTH (optional Google sign-in gate)
   ----------------------------------------------------------------------------
   Turns on ONLY when config.GOOGLE_CLIENT_ID is set. When on, players must sign
   in with Google before playing. The Google Identity Services script is loaded
   on demand (never loaded when sign-in is off), so the game stays offline-first
   by default.

   IMPORTANT (security): the Google ID token is decoded here in the browser just
   to greet the player and remember who they are locally. This is NOT a secured
   account. For real accounts, send the raw token to a server and verify it with
   Google before trusting the identity. The code is shaped so that upgrade is a
   drop-in: replace _userFromCredential / setUser with a call to your backend.
   ============================================================================ */

window.DECODED = window.DECODED || {};

(function () {
  var GIS_SRC = "https://accounts.google.com/gsi/client";
  var loaded = false, loading = false, waiters = [];

  function flush(ok) {
    loaded = ok;
    var list = waiters.slice();
    waiters = [];
    list.forEach(function (cb) { cb(ok); });
  }

  DECODED.auth = {
    // Sign-in is available only when a Client ID is configured.
    isEnabled: function () {
      var id = DECODED.config.GOOGLE_CLIENT_ID;
      return !!(id && String(id).trim());
    },

    // Whether players are REQUIRED to sign in before playing.
    isRequired: function () {
      return this.isEnabled() && DECODED.config.REQUIRE_SIGN_IN !== false;
    },

    getUser: function () { return DECODED.state.get().user; },

    signOut: function () {
      try {
        if (window.google && google.accounts && google.accounts.id) {
          google.accounts.id.disableAutoSelect();
        }
      } catch (e) { /* ignore */ }
      DECODED.state.clearUser();
    },

    // Load the Google script on demand, then call cb(ok).
    load: function (cb) {
      if (!this.isEnabled()) { cb(false); return; }
      if (loaded) { cb(true); return; }
      waiters.push(cb);
      if (loading) return;
      loading = true;
      var s = document.createElement("script");
      s.src = GIS_SRC;
      s.async = true;
      s.defer = true;
      s.onload = function () { loading = false; flush(true); };
      s.onerror = function () { loading = false; flush(false); };
      document.head.appendChild(s);
    },

    // Render the official Google button into `container`. Calls onUser(user)
    // after a successful sign-in.
    renderButton: function (container, onUser) {
      var self = this;
      this.load(function (ok) {
        if (!ok || !window.google || !google.accounts || !google.accounts.id) {
          container.innerHTML = '<div class="auth-error">Google Sign-In could not load. ' +
            "Check the Client ID in js/config.js and that this web address is listed as an authorized origin.</div>";
          return;
        }
        google.accounts.id.initialize({
          client_id: DECODED.config.GOOGLE_CLIENT_ID,
          callback: function (resp) {
            var user = self._userFromCredential(resp && resp.credential);
            if (user) {
              DECODED.state.setUser(user);
              if (onUser) onUser(user);
            }
          }
        });
        container.innerHTML = "";
        google.accounts.id.renderButton(container, {
          theme: "filled_black",
          size: "large",
          shape: "pill",
          text: "continue_with",
          logo_alignment: "left"
        });
      });
    },

    // Decode a Google ID token (JWT) into a small user object.
    _userFromCredential: function (jwt) {
      if (!jwt) return null;
      try {
        var payload = jwt.split(".")[1];
        var b64 = payload.replace(/-/g, "+").replace(/_/g, "/");
        var json = decodeURIComponent(atob(b64).split("").map(function (c) {
          return "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(""));
        var p = JSON.parse(json);
        return {
          id: p.sub,
          email: p.email || "",
          name: p.name || p.given_name || "Player",
          firstName: p.given_name || (p.name ? p.name.split(" ")[0] : "Player"),
          picture: p.picture || ""
        };
      } catch (e) {
        return null;
      }
    }
  };
})();
</script>
<script>
/* ============================================================================
   DECODED - LEADERBOARD
   ----------------------------------------------------------------------------
   Local for now, seeded from data/copy.js. Architected so a shared backend
   leaderboard can replace this later: keep the same fetch/add interface and
   swap the internals for network calls.
   ============================================================================ */

window.DECODED = window.DECODED || {};

(function () {
  var KEY = DECODED.config.STORAGE_PREFIX + "leaderboard";

  function load() {
    try {
      var raw = localStorage.getItem(KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    // First run: start from the seed.
    var seed = DECODED.leaderboardSeed.map(function (e) {
      return { initials: e.initials, score: e.score, seed: true };
    });
    save(seed);
    return seed;
  }

  function save(list) {
    try { localStorage.setItem(KEY, JSON.stringify(list)); } catch (e) {}
  }

  function sorted(list) {
    return list.slice().sort(function (a, b) { return b.score - a.score; });
  }

  DECODED.leaderboard = {
    // Returns entries sorted high to low. Async-shaped for a future backend.
    fetch: function () {
      return sorted(load());
    },

    add: function (initials, score) {
      var list = load();
      initials = (initials || "YOU").toUpperCase().replace(/[^A-Z]/g, "").slice(0, 4) || "YOU";
      var entry = { initials: initials, score: score, you: true };
      list.push(entry);
      save(list);
      return sorted(list);
    }
  };
})();
</script>
<script>
/* ============================================================================
   DECODED - FX (atmosphere and feedback)
   ----------------------------------------------------------------------------
   - Moving-code background: faint pseudo-code drifting upward.
   - Confetti burst on level completion.
   - Floating "+points" burst on correct answers.
   All of it respects prefers-reduced-motion (see DECODED.reducedMotion).
   ============================================================================ */

window.DECODED = window.DECODED || {};

(function () {

  DECODED.reducedMotion = function () {
    try {
      return window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    } catch (e) { return false; }
  };

  /* ---------------------------- Moving code bg ---------------------------- */
  var CODE_SNIPPETS = [
    "model.fit(train_data, labels)",
    "if confidence < 0.7: verify()",
    "def predict(next_word): ...",
    "agent.use(tool='search')",
    "for example in dataset:",
    "prompt = role + task + format",
    "loss = cross_entropy(y, y_hat)",
    "while learning: improve()",
    "tokens = encode(sentence)",
    "return most_likely(options)",
    "data = clean(raw_examples)",
    "weights += learning_rate * grad",
    "response = llm.generate(prompt)",
    "review(output)  # always",
    "risk = bias or misuse",
    "value = leverage.aim(goal)"
  ];

  DECODED.initBackground = function () {
    var host = document.getElementById("bg-code");
    if (!host) return;
    if (DECODED.reducedMotion()) { host.innerHTML = ""; return; }

    var count = window.innerWidth < 640 ? 14 : 26;
    var html = "";
    for (var i = 0; i < count; i++) {
      var text = CODE_SNIPPETS[i % CODE_SNIPPETS.length];
      var left = Math.round(Math.random() * 96);
      var dur = 16 + Math.random() * 20;
      var delay = -Math.random() * dur;
      var size = 11 + Math.random() * 5;
      html += '<span class="bg-line" style="left:' + left + '%;' +
              'animation-duration:' + dur.toFixed(1) + 's;' +
              'animation-delay:' + delay.toFixed(1) + 's;' +
              'font-size:' + size.toFixed(0) + 'px;">' + text + '</span>';
    }
    host.innerHTML = html;
  };

  /* ------------------------------ Confetti ------------------------------- */
  DECODED.confetti = function () {
    if (DECODED.reducedMotion()) return;
    var colors = ["#C6FF3A", "#3AE8FF", "#FFB13A", "#F5F7F2", "#8FBE1F"];
    var layer = document.createElement("div");
    layer.className = "confetti-layer";
    document.body.appendChild(layer);
    var n = 90;
    for (var i = 0; i < n; i++) {
      var p = document.createElement("i");
      p.className = "confetti-bit";
      p.style.left = Math.random() * 100 + "vw";
      p.style.background = colors[i % colors.length];
      p.style.animationDuration = (1.6 + Math.random() * 1.4) + "s";
      p.style.animationDelay = (Math.random() * 0.3) + "s";
      p.style.transform = "rotate(" + Math.random() * 360 + "deg)";
      p.style.width = (6 + Math.random() * 6) + "px";
      p.style.height = (8 + Math.random() * 8) + "px";
      layer.appendChild(p);
    }
    setTimeout(function () { layer.remove(); }, 3400);
  };

  /* --------------------------- Floating points --------------------------- */
  // Shows a "+N" burst near an element (or at given page coords).
  DECODED.floatPoints = function (text, anchorEl) {
    var burst = document.createElement("div");
    burst.className = "points-burst";
    burst.textContent = text;
    var x = window.innerWidth / 2, y = window.innerHeight / 2;
    if (anchorEl && anchorEl.getBoundingClientRect) {
      var r = anchorEl.getBoundingClientRect();
      x = r.left + r.width / 2;
      y = r.top + r.height / 2;
    }
    burst.style.left = x + "px";
    burst.style.top = y + "px";
    document.body.appendChild(burst);
    setTimeout(function () { burst.remove(); }, 1100);
  };
})();
</script>
<script>
/* ============================================================================
   DECODED - SHARE CARD
   ----------------------------------------------------------------------------
   Draws a 1080x1080 shareable image on a canvas: the player's mascot, the
   DECODED wordmark, the maker tagline, score, rank, the "I decoded AI. Can you?"
   line, and where to play free. Used for the live preview, Download, and Share.
   ============================================================================ */

window.DECODED = window.DECODED || {};

(function () {
  var SIZE = 1080;

  // Renders the card onto the given canvas. Calls done() when finished
  // (mascot image loads asynchronously).
  DECODED.buildShareCard = function (canvas, data, done) {
    canvas.width = SIZE;
    canvas.height = SIZE;
    var ctx = canvas.getContext("2d");
    var guide = DECODED.guides[data.guide] || DECODED.guides.ada;

    // Background
    ctx.fillStyle = "#0B0B0C";
    ctx.fillRect(0, 0, SIZE, SIZE);

    // Panel with border
    roundRect(ctx, 60, 60, SIZE - 120, SIZE - 120, 36);
    ctx.fillStyle = "#141417";
    ctx.fill();
    ctx.lineWidth = 3;
    ctx.strokeStyle = "#2A2A31";
    ctx.stroke();

    // Accent glow bar at top
    ctx.fillStyle = guide.color;
    roundRect(ctx, SIZE / 2 - 60, 96, 120, 8, 4);
    ctx.fill();

    // Draw mascot (async), then all the text.
    var svg = DECODED.mascotSVG(guide.id, { animate: false, size: 300 });
    var img = new Image();
    var svg64 = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);

    img.onload = function () { paint(img); };
    img.onerror = function () { paint(null); };
    img.src = svg64;

    function paint(mascotImg) {
      if (mascotImg) {
        ctx.drawImage(mascotImg, SIZE / 2 - 150, 150, 300, 315);
      }

      ctx.textAlign = "center";

      // Wordmark
      ctx.fillStyle = guide.color;
      ctx.font = "800 120px Inter, Arial, sans-serif";
      ctx.fillText(DECODED.config.BRAND.productName, SIZE / 2, 590);

      // Maker tagline
      ctx.fillStyle = "#9A9AA3";
      ctx.font = "700 30px Inter, Arial, sans-serif";
      ctx.fillText(DECODED.config.BRAND.tagline, SIZE / 2, 636);

      // Score + rank pill
      ctx.fillStyle = "#F5F7F2";
      ctx.font = "800 78px Inter, Arial, sans-serif";
      ctx.fillText(data.score + " pts", SIZE / 2, 736);

      var rankText = data.rank;
      ctx.font = "700 40px Inter, Arial, sans-serif";
      var rw = ctx.measureText(rankText).width + 64;
      roundRect(ctx, SIZE / 2 - rw / 2, 770, rw, 72, 36);
      ctx.fillStyle = "#1C1C21";
      ctx.fill();
      ctx.strokeStyle = guide.color;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = guide.color;
      ctx.fillText(rankText, SIZE / 2, 819);

      // Hook line
      ctx.fillStyle = "#F5F7F2";
      ctx.font = "800 58px Inter, Arial, sans-serif";
      ctx.fillText("I decoded AI. Can you?", SIZE / 2, 928);

      // Play free line
      ctx.fillStyle = "#9A9AA3";
      ctx.font = "600 34px Inter, Arial, sans-serif";
      ctx.fillText("Play free at " + DECODED.config.SITE_URL_LABEL, SIZE / 2, 986);

      if (done) done(canvas);
    }
  };

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }
})();
</script>
<script>
/* ============================================================================
   DECODED - ENGINE (the 11 mini-games)
   ----------------------------------------------------------------------------
   Each mechanic renders itself into a container and reports progress through a
   shared "round" context (ctx) provided by app.js:
     ctx.correct(basePoints, anchorEl)  -> awards points with streak logic
     ctx.wrong()                        -> resets the streak
     ctx.award(points, anchorEl)        -> flat bonus, no streak change
     ctx.finish()                       -> the mini-game is done; show the reveal
   Adding a new level type means adding one function to DECODED.mechanics.
   ============================================================================ */

window.DECODED = window.DECODED || {};

(function () {
  var el = DECODED.dom.el;
  var clear = DECODED.dom.clear;
  var icon = DECODED.icon;

  // Small inline feedback marker (check / cross) that reads with the text.
  function fbMark(good) {
    return '<span class="fb-mark">' + icon(good ? "check-circle" : "xmark-circle") + '</span> ';
  }

  DECODED.mechanics = {};

  /* ======================================================================
     Shared: a step-by-step quiz used by several levels
     (sort-binary, true-false, judge-scenarios, multiple-choice).
     `questions` is a normalized list: { prompt, options:[{key,label,icon}],
     correct, why }.
  ====================================================================== */
  function runQuiz(container, ctx, level, questions) {
    var i = 0, correctCount = 0;
    var stage = el("div", "quiz-stage");
    container.appendChild(stage);

    function progressText() {
      return "Question " + (i + 1) + " of " + questions.length;
    }

    function renderQuestion() {
      clear(stage);
      var q = questions[i];

      var card = el("div", "card fade-up");
      card.appendChild(el("div", "quiz-count", progressText()));
      card.appendChild(el("div", "quiz-prompt", q.prompt));

      var opts = el("div", "options");
      var buttons = [];
      q.options.forEach(function (opt) {
        var btn = el("button", "option-btn", null, {
          type: "button",
          "aria-label": opt.plain || opt.label
        });
        btn.appendChild(el("span", "opt-icon", opt.icon ? DECODED.icon(opt.icon) : ""));
        btn.appendChild(el("span", "opt-label", opt.label));
        btn.addEventListener("click", function () { choose(opt.key, btn, buttons, q); });
        buttons.push(btn);
        opts.appendChild(btn);
      });
      card.appendChild(opts);

      var feedback = el("div", "feedback", "", { "aria-live": "polite" });
      card.appendChild(feedback);

      stage.appendChild(card);
      DECODED.dom.stagger(buttons, 55);
    }

    function choose(key, btn, buttons, q) {
      buttons.forEach(function (b) { b.disabled = true; });
      var feedback = stage.querySelector(".feedback");
      var right = key === q.correct;

      if (right) {
        btn.classList.add("correct");
        correctCount++;
        ctx.correct(level.points, btn);
      } else {
        btn.classList.add("wrong");
        ctx.wrong();
        // Also highlight the correct one.
        buttons.forEach(function (b) {
          if (b.getAttribute("data-key") === q.correct) b.classList.add("correct");
        });
        var correctBtn = buttons[keyIndex(q, q.correct)];
        if (correctBtn) correctBtn.classList.add("correct");
      }

      feedback.className = "feedback show " + (right ? "good" : "bad");
      feedback.innerHTML =
        '<div class="fb-head">' + fbMark(right) + (right ? "Nice" : "Not quite") + '</div>' +
        '<div class="fb-why">' + q.why + '</div>';

      var last = i === questions.length - 1;
      var next = el("button", "btn primary next-btn",
        last ? "See what this means" : "Continue", { type: "button" });
      next.addEventListener("click", function () {
        if (last) { ctx.finish({ correct: correctCount, total: questions.length }); }
        else { i++; renderQuestion(); }
      });
      feedback.appendChild(next);
      next.focus();
    }

    function keyIndex(q, key) {
      for (var k = 0; k < q.options.length; k++) {
        if (q.options[k].key === key) return k;
      }
      return -1;
    }

    // Tag buttons with their key so we can find the correct one after a wrong pick.
    var origRender = renderQuestion;
    renderQuestion = function () {
      origRender();
      var btns = stage.querySelectorAll(".option-btn");
      var q = questions[i];
      for (var k = 0; k < btns.length; k++) btns[k].setAttribute("data-key", q.options[k].key);
    };

    renderQuestion();
  }

  /* ---------- LEVEL 1: sort-binary ---------- */
  DECODED.mechanics["sort-binary"] = function (level, container, ctx) {
    var questions = level.items.map(function (item) {
      return {
        prompt: '<span class="big-icon">' + icon(item.icon, { size: 52 }) + '</span>' +
                '<span class="prompt-label">' + item.label + '</span>',
        options: level.options,
        correct: item.answer,
        why: item.why
      };
    });
    runQuiz(container, ctx, level, questions);
  };

  /* ---------- LEVEL 4: true-false ---------- */
  DECODED.mechanics["true-false"] = function (level, container, ctx) {
    var questions = level.statements.map(function (s) {
      return {
        prompt: '<span class="statement">' + s.text + '</span>',
        options: level.options,
        correct: s.answer,
        why: s.why
      };
    });
    runQuiz(container, ctx, level, questions);
  };

  /* ---------- LEVEL 8: judge-scenarios ---------- */
  DECODED.mechanics["judge-scenarios"] = function (level, container, ctx) {
    var questions = level.scenarios.map(function (s) {
      return {
        prompt: '<span class="statement">' + s.text + '</span>',
        options: level.options,
        correct: s.answer,
        why: s.why
      };
    });
    runQuiz(container, ctx, level, questions);
  };

  /* ---------- LEVELS 9,10,11: multiple-choice ---------- */
  DECODED.mechanics["multiple-choice"] = function (level, container, ctx) {
    var questions = level.questions.map(function (q) {
      return {
        prompt: '<span class="statement">' + q.scenario + '</span>',
        options: q.options.map(function (label, idx) {
          return { key: String(idx), label: label, icon: "nav-arrow-right", plain: label };
        }),
        correct: String(q.answer),
        why: q.why
      };
    });
    runQuiz(container, ctx, level, questions);
  };

  /* ---------- LEVEL 2: train-model ---------- */
  DECODED.mechanics["train-model"] = function (level, container, ctx) {
    var i = 0, correctCount = 0;
    var stage = el("div", "quiz-stage");
    container.appendChild(stage);

    function renderLabel() {
      clear(stage);
      var item = level.training[i];
      var card = el("div", "card fade-up");
      card.appendChild(el("div", "quiz-count", "Training example " + (i + 1) + " of " + level.training.length));
      card.appendChild(el("div", "quiz-prompt", '<span class="big-icon">' + icon(item.icon, { size: 52 }) + '</span><span class="prompt-label">What is this?</span>'));

      var opts = el("div", "options");
      var buttons = [];
      level.labels.forEach(function (lab) {
        var btn = el("button", "option-btn", null, { type: "button" });
        btn.appendChild(el("span", "opt-icon", icon(lab.icon)));
        btn.appendChild(el("span", "opt-label", lab.label));
        btn.addEventListener("click", function () { pick(lab.key, btn, buttons, item); });
        buttons.push(btn);
        opts.appendChild(btn);
      });
      card.appendChild(opts);
      card.appendChild(el("div", "feedback", "", { "aria-live": "polite" }));
      stage.appendChild(card);
      DECODED.dom.stagger(buttons, 55);
    }

    function pick(key, btn, buttons, item) {
      buttons.forEach(function (b) { b.disabled = true; });
      var right = key === item.truth;
      var feedback = stage.querySelector(".feedback");
      if (right) { btn.classList.add("correct"); correctCount++; ctx.correct(level.points, btn); }
      else { btn.classList.add("wrong"); ctx.wrong(); }

      feedback.className = "feedback show " + (right ? "good" : "bad");
      feedback.innerHTML = '<div class="fb-head">' + fbMark(right) + (right ? "Labeled" : "Mislabeled") + '</div>' +
        '<div class="fb-why">' + (right ? "Clean label. That is good training data." : "A wrong label teaches the model the wrong thing.") + '</div>';

      var last = i === level.training.length - 1;
      var next = el("button", "btn primary next-btn", last ? "Test the model" : "Next example", { type: "button" });
      next.addEventListener("click", function () { if (last) runTest(); else { i++; renderLabel(); } });
      feedback.appendChild(next);
      next.focus();
    }

    function runTest() {
      clear(stage);
      var accuracy = correctCount / level.training.length;
      var numRight = Math.round(level.testing.length * accuracy);
      var card = el("div", "card fade-up");
      card.appendChild(el("div", "quiz-count", "Your model takes the test"));
      card.appendChild(el("div", "quiz-prompt",
        '<span class="prompt-label">You labeled ' + correctCount + ' of ' + level.training.length +
        ' correctly. Here is how well the model learned.</span>'));

      var grid = el("div", "test-grid");
      card.appendChild(grid);
      stage.appendChild(card);

      // Decide which test items the model gets right (first numRight get correct predictions).
      var results = level.testing.map(function (t, idx) {
        return { item: t, modelRight: idx < numRight };
      });

      var done = el("div", "feedback", "", { "aria-live": "polite" });
      card.appendChild(done);

      // The "other" label for a wrong prediction (works for any two labels).
      function otherLabel(truth) {
        var o = level.labels.filter(function (l) { return l.key !== truth; })[0];
        return o ? o.key : truth;
      }

      var d = 0;
      results.forEach(function (r, idx) {
        setTimeout(function () {
          var pred = r.modelRight ? r.item.truth : otherLabel(r.item.truth);
          var predLabel = level.labels.filter(function (l) { return l.key === pred; })[0];
          var cell = el("div", "test-cell pop-in " + (r.modelRight ? "good" : "bad"));
          cell.innerHTML = '<span class="big-icon">' + icon(r.item.icon, { size: 40 }) + '</span>' +
            '<span class="test-pred">Model says: ' + predLabel.label + '</span>' +
            '<span class="test-mark">' + icon(r.modelRight ? "check-circle" : "xmark-circle", { size: 20 }) + '</span>';
          grid.appendChild(cell);
          if (idx === results.length - 1) {
            done.className = "feedback show " + (accuracy >= 0.75 ? "good" : "bad");
            done.innerHTML = '<div class="fb-head">Model accuracy: ' + Math.round(accuracy * 100) + '%</div>' +
              '<div class="fb-why">' + (accuracy >= 0.75
                ? "Clean labels, sharp model. This is what good data buys you."
                : "Messy labels, shaky model. The data, not the model, was the problem.") + '</div>';
            var next = el("button", "btn primary next-btn", "See what this means", { type: "button" });
            next.addEventListener("click", function () { ctx.finish({ correct: correctCount, total: level.training.length }); });
            done.appendChild(next);
            next.focus();
          }
        }, d);
        d += 650;
      });
    }

    renderLabel();
  };

  /* ---------- LEVEL 3: next-word ---------- */
  DECODED.mechanics["next-word"] = function (level, container, ctx) {
    var i = 0, matchCount = 0;
    var stage = el("div", "quiz-stage");
    container.appendChild(stage);

    function render() {
      clear(stage);
      var round = level.rounds[i];
      var top = round.options.slice().sort(function (a, b) { return b.p - a.p; })[0].word;

      var card = el("div", "card fade-up");
      card.appendChild(el("div", "quiz-count", "Sentence " + (i + 1) + " of " + level.rounds.length));
      card.appendChild(el("div", "quiz-prompt",
        '<span class="statement">' + round.stub.replace("___", '<span class="blank">?</span>') + '</span>'));

      var opts = el("div", "options word-options");
      var buttons = [];
      round.options.forEach(function (o) {
        var btn = el("button", "option-btn word-btn", '<span class="opt-label">' + o.word + '</span>', { type: "button" });
        btn.addEventListener("click", function () { pick(o.word, top, round, buttons, card); });
        buttons.push(btn);
        opts.appendChild(btn);
      });
      card.appendChild(opts);
      card.appendChild(el("div", "feedback", "", { "aria-live": "polite" }));
      stage.appendChild(card);
      DECODED.dom.stagger(buttons, 55);
    }

    function pick(word, top, round, buttons, card) {
      buttons.forEach(function (b) { b.disabled = true; });
      var matched = word === top;
      if (matched) { matchCount++; ctx.correct(level.points, card); } else ctx.wrong();

      // Reveal probability bars.
      var bars = el("div", "prob-bars");
      round.options.slice().sort(function (a, b) { return b.p - a.p; }).forEach(function (o) {
        var row = el("div", "prob-row" + (o.word === top ? " top" : "") + (o.word === word ? " picked" : ""));
        row.innerHTML = '<span class="prob-word">' + o.word + (o.word === word ? ' <span class="you-pick">you</span>' : "") + '</span>' +
          '<span class="prob-track"><span class="prob-fill" style="width:0%"></span></span>' +
          '<span class="prob-pct">' + Math.round(o.p * 100) + '%</span>';
        bars.appendChild(row);
        setTimeout(function () {
          row.querySelector(".prob-fill").style.width = Math.round(o.p * 100) + "%";
        }, 30);
      });
      card.appendChild(bars);

      var feedback = card.querySelector(".feedback");
      feedback.className = "feedback show " + (matched ? "good" : "bad");
      feedback.innerHTML = '<div class="fb-head">' + fbMark(matched) + (matched ? "You matched the AI" : "AI went with " + top) + '</div>' +
        '<div class="fb-why">The AI leans toward the highest bar. You picked ' + word + '.</div>';

      var last = i === level.rounds.length - 1;
      var next = el("button", "btn primary next-btn", last ? "See what this means" : "Next sentence", { type: "button" });
      next.addEventListener("click", function () { if (last) ctx.finish({ correct: matchCount, total: level.rounds.length }); else { i++; render(); } });
      feedback.appendChild(next);
      next.focus();
    }

    render();
  };

  /* ---------- LEVEL 5: prompt-upgrade ---------- */
  DECODED.mechanics["prompt-upgrade"] = function (level, container, ctx) {
    var awarded = {};   // which upgrades already earned points
    var active = {};    // which upgrades are currently on
    var bonusGiven = false;

    var card = el("div", "card fade-up");
    card.appendChild(el("div", "quiz-count", "Upgrade the prompt"));

    // Live preview
    var preview = el("div", "prompt-preview");
    card.appendChild(preview);

    // Quality meter
    var meterWrap = el("div", "meter-wrap");
    meterWrap.innerHTML = '<div class="meter-label"><span>Prompt quality</span><span class="meter-count">0 of 4 upgrades</span></div>' +
      '<div class="meter-track"><span class="meter-fill" style="width:8%"></span></div>';
    card.appendChild(meterWrap);

    // Chips
    var chips = el("div", "chips");
    var chipButtons = [];
    level.upgrades.forEach(function (up) {
      var btn = el("button", "chip", null, { type: "button", "aria-pressed": "false" });
      btn.appendChild(el("span", "chip-icon", icon(up.icon)));
      btn.appendChild(el("span", "chip-text", up.chip));
      btn.addEventListener("click", function () { toggle(up, btn); });
      chipButtons.push(btn);
      chips.appendChild(btn);
    });
    card.appendChild(chips);

    var feedback = el("div", "feedback", "", { "aria-live": "polite" });
    card.appendChild(feedback);

    container.appendChild(card);
    DECODED.dom.stagger(chipButtons, 60);
    renderPreview();

    function toggle(up, btn) {
      active[up.key] = !active[up.key];
      btn.classList.toggle("on", active[up.key]);
      btn.setAttribute("aria-pressed", active[up.key] ? "true" : "false");

      if (active[up.key] && !awarded[up.key]) {
        awarded[up.key] = true;
        ctx.correct(level.points, btn);
      }
      renderPreview();
      checkComplete();
    }

    function renderPreview() {
      var lines = ['<span class="pp-base">' + level.basePrompt + '</span>'];
      level.upgrades.forEach(function (up) {
        if (active[up.key]) lines.push('<span class="pp-add">' + up.text + '</span>');
      });
      preview.innerHTML = lines.join("");

      var count = level.upgrades.filter(function (u) { return active[u.key]; }).length;
      meterWrap.querySelector(".meter-count").textContent = count + " of 4 upgrades";
      meterWrap.querySelector(".meter-fill").style.width = (8 + (count / 4) * 92) + "%";
    }

    function checkComplete() {
      var allOn = level.upgrades.every(function (u) { return active[u.key]; });
      if (allOn && !bonusGiven) {
        bonusGiven = true;
        ctx.award(level.completionBonus, meterWrap);
        feedback.className = "feedback show good";
        feedback.innerHTML = '<div class="fb-head">' + fbMark(true) + 'Four of four. Prompt maxed out.</div>' +
          '<div class="fb-why">Plus a ' + level.completionBonus + ' point bonus for the full upgrade.</div>';
        var next = el("button", "btn primary next-btn", "See what this means", { type: "button" });
        next.addEventListener("click", function () { ctx.finish(); });
        feedback.appendChild(next);
        next.focus();
      }
    }
  };

  /* ---------- LEVEL 6: agent-tools ---------- */
  DECODED.mechanics["agent-tools"] = function (level, container, ctx) {
    var equipped = {};

    var card = el("div", "card fade-up");
    card.appendChild(el("div", "quiz-count", "The goal"));
    card.appendChild(el("div", "goal-box", '<span class="goal-icon">' + icon("star") + '</span>' + level.goal));

    var toolWrap = el("div", "tool-grid");
    var toolButtons = [];
    level.tools.forEach(function (t) {
      var btn = el("button", "tool-btn", null, { type: "button", "aria-pressed": "false" });
      btn.appendChild(el("span", "tool-icon", icon(t.icon, { size: 28 })));
      btn.appendChild(el("span", "tool-label", t.label));
      btn.addEventListener("click", function () {
        equipped[t.key] = !equipped[t.key];
        btn.classList.toggle("on", equipped[t.key]);
        btn.setAttribute("aria-pressed", equipped[t.key] ? "true" : "false");
      });
      toolButtons.push(btn);
      toolWrap.appendChild(btn);
    });
    card.appendChild(el("div", "tool-hint", "Equip the tools your agent needs, then run it."));
    card.appendChild(toolWrap);

    var runBtn = el("button", "btn primary run-btn", '<span class="btn-ic">' + icon("play") + '</span>Run agent', { type: "button" });
    card.appendChild(runBtn);

    var log = el("div", "agent-log", "", { "aria-live": "polite" });
    card.appendChild(log);

    var feedback = el("div", "feedback", "", { "aria-live": "polite" });
    card.appendChild(feedback);

    container.appendChild(card);
    DECODED.dom.stagger(toolButtons, 60);

    runBtn.addEventListener("click", run);

    function run() {
      clear(log);
      clear(feedback);
      feedback.className = "feedback";
      runBtn.disabled = true;

      var extraCalc = equipped.calculator;
      var lines = level.steps.map(function (s) {
        return { text: equipped[s.need] ? s.ok : s.fail, ok: !!equipped[s.need] };
      });

      var d = 0;
      lines.forEach(function (ln, idx) {
        setTimeout(function () {
          var row = el("div", "log-line pop-in " + (ln.ok ? "ok" : "stall"));
          row.innerHTML = '<span class="log-mark">' + icon(ln.ok ? "check-circle" : "xmark-circle", { size: 18 }) + '</span>' + ln.text;
          log.appendChild(row);
          if (idx === lines.length - 1) finishRun(lines, extraCalc);
        }, d);
        d += 700;
      });
    }

    function finishRun(lines, extraCalc) {
      var allOk = lines.every(function (l) { return l.ok; });
      var perfectKit = allOk && !extraCalc;

      if (extraCalc) {
        var calcRow = el("div", "log-line stall pop-in",
          '<span class="log-mark">' + icon("xmark-circle", { size: 18 }) + '</span>Calculator sat unused. This task never needed it.');
        log.appendChild(calcRow);
      }

      if (perfectKit) {
        ctx.award(level.bonus, runBtn);
        feedback.className = "feedback show good";
        feedback.innerHTML = '<div class="fb-head">' + fbMark(true) + 'Goal complete. Perfect kit.</div>' +
          '<div class="fb-why">Search, Calendar, and Email, nothing wasted. Plus a ' + level.bonus + ' point bonus.</div>';
        var next = el("button", "btn primary next-btn", "See what this means", { type: "button" });
        next.addEventListener("click", function () { ctx.finish(); });
        feedback.appendChild(next);
        next.focus();
      } else {
        ctx.wrong();
        feedback.className = "feedback show bad";
        feedback.innerHTML = '<div class="fb-head">' + fbMark(false) + 'Not quite the right kit</div>' +
          '<div class="fb-why">' + (extraCalc
            ? "Drop the Calculator and make sure Search, Calendar, and Email are all on."
            : "Your agent stalled. Give it every tool the goal needs, then run again.") + '</div>';
        runBtn.disabled = false;
        runBtn.innerHTML = '<span class="btn-ic">' + icon("refresh-double") + '</span>Run again';
        runBtn.focus();
      }
    }
  };

  /* ---------- LEVEL 7: order-steps ---------- */
  DECODED.mechanics["order-steps"] = function (level, container, ctx) {
    var target = level.steps.slice().sort(function (a, b) { return a.order - b.order; });
    var pool = shuffle(level.steps.slice());
    // Avoid an accidentally-correct starting shuffle.
    if (isSorted(pool)) pool = shuffle(pool.slice());
    var placed = [];

    var card = el("div", "card fade-up");
    card.appendChild(el("div", "quiz-count", "Put the steps in order"));
    card.appendChild(el("div", "order-hint", "Tap the steps in the order they should happen, top to bottom."));

    var slots = el("ol", "order-slots");
    card.appendChild(slots);

    var poolWrap = el("div", "order-pool");
    card.appendChild(poolWrap);

    var actions = el("div", "order-actions");
    var resetBtn = el("button", "btn ghost", "Reset", { type: "button" });
    actions.appendChild(resetBtn);
    card.appendChild(actions);

    var feedback = el("div", "feedback", "", { "aria-live": "polite" });
    card.appendChild(feedback);

    container.appendChild(card);
    resetBtn.addEventListener("click", reset);
    renderPool();
    renderSlots();

    function renderPool() {
      clear(poolWrap);
      var buttons = [];
      pool.forEach(function (step) {
        if (placed.indexOf(step) !== -1) return;
        var btn = el("button", "step-chip", '<span class="step-icon">' + icon(step.icon, { size: 22 }) + '</span>' + step.text, { type: "button" });
        btn.addEventListener("click", function () { place(step); });
        buttons.push(btn);
        poolWrap.appendChild(btn);
      });
      DECODED.dom.stagger(buttons, 50);
    }

    function renderSlots() {
      clear(slots);
      for (var s = 0; s < target.length; s++) {
        var li = el("li", "order-slot");
        if (placed[s]) {
          li.classList.add("filled");
          li.innerHTML = '<span class="slot-num">' + (s + 1) + '</span>' +
            '<span class="step-icon">' + icon(placed[s].icon, { size: 22 }) + '</span>' + placed[s].text;
        } else {
          li.innerHTML = '<span class="slot-num">' + (s + 1) + '</span><span class="slot-empty">Tap a step below</span>';
        }
        slots.appendChild(li);
      }
    }

    function place(step) {
      placed.push(step);
      renderPool();
      renderSlots();
      if (placed.length === target.length) check();
    }

    function reset() {
      placed = [];
      feedback.className = "feedback";
      feedback.innerHTML = "";
      renderPool();
      renderSlots();
    }

    function check() {
      var correct = 0;
      var lis = slots.querySelectorAll(".order-slot");
      for (var s = 0; s < target.length; s++) {
        var right = placed[s].order === target[s].order;
        if (right) { correct++; lis[s].classList.add("good"); }
        else { lis[s].classList.add("bad"); }
      }
      if (correct > 0) ctx.correct(level.points * correct, slots); else ctx.wrong();

      feedback.className = "feedback show " + (correct === target.length ? "good" : "bad");
      feedback.innerHTML = '<div class="fb-head">' + fbMark(correct === target.length) + (correct === target.length
        ? "Perfect order" : "You placed " + correct + " of " + target.length + " correctly") + '</div>' +
        '<div class="fb-why">The right flow is: describe, AI writes, run it, then refine.</div>';

      var next = el("button", "btn primary next-btn", "See what this means", { type: "button" });
      next.addEventListener("click", function () { ctx.finish({ correct: correct, total: target.length }); });
      feedback.appendChild(next);
      resetBtn.disabled = true;
      next.focus();
    }
  };

  /* -------------------------- small utilities -------------------------- */
  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }
  function isSorted(arr) {
    for (var i = 1; i < arr.length; i++) if (arr[i].order < arr[i - 1].order) return false;
    return true;
  }
})();
</script>
<script>
/* ============================================================================
   DECODED - APP
   ----------------------------------------------------------------------------
   Screen flow, HUD, per-level scoring context, reveals, certificate,
   leaderboard, and growth features. This is the orchestration layer; the
   mini-games themselves live in engine.js and the content in js/data/*.
   ============================================================================ */

window.DECODED = window.DECODED || {};

(function () {
  var el = DECODED.dom.el;
  var clear = DECODED.dom.clear;
  var S = DECODED.state;
  var icon = DECODED.icon;

  // Leading icon: sits inside a button/label, before its text.
  function ic(name, size) { return '<span class="ui-ic">' + icon(name, { size: size || 18 }) + '</span>'; }
  // Trailing icon: after the text.
  function ic2(name, size) { return '<span class="ui-ic ui-ic-r">' + icon(name, { size: size || 18 }) + '</span>'; }

  var root, hud;

  DECODED.app = {
    init: function () {
      root = document.getElementById("screen");
      hud = document.getElementById("hud");
      applyTheme(S.get().theme);
      wireThemeToggle();
      DECODED.initBackground();
      renderHeader();
      var st = S.get();
      // When Google sign-in is required, gate everything behind it.
      if (DECODED.auth.isRequired() && !DECODED.auth.getUser()) {
        screenSignIn();
      } else if (!st.guide) {
        screenSplash();
      } else {
        screenHome();
      }
      updateHud();
    }
  };

  // Where to go once the player is signed in (or when no sign-in is needed).
  function enterGame() {
    renderHeader();
    updateHud();
    if (!S.get().guide) screenSplash();
    else screenHome();
  }

  /* ------------------------------ Theme --------------------------------- */
  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    var btn = document.getElementById("theme-toggle");
    if (btn) {
      // Show the icon for the theme you would switch TO.
      var toDark = theme === "light";
      btn.innerHTML = icon(toDark ? "half-moon" : "sun-light", { size: 20 });
      btn.setAttribute("aria-label", toDark ? "Switch to dark theme" : "Switch to light theme");
    }
  }
  function wireThemeToggle() {
    var btn = document.getElementById("theme-toggle");
    if (!btn) return;
    btn.addEventListener("click", function () {
      var next = S.get().theme === "dark" ? "light" : "dark";
      S.setTheme(next);
      applyTheme(next);
    });
  }

  /* ------------------------------ Header -------------------------------- */
  function renderHeader() {
    var header = document.getElementById("brandbar");
    clear(header);
    // Header logo is always Ada (green).
    var logo = el("a", "brand", null, { href: "#", "aria-label": "Decoded home" });
    logo.innerHTML = '<span class="brand-mascot">' +
      DECODED.mascotSVG("ada", { size: 40, animate: !DECODED.reducedMotion() }) + '</span>' +
      '<span class="brand-word">' + DECODED.config.BRAND.productName + '</span>';
    logo.addEventListener("click", function (e) {
      e.preventDefault();
      if (S.get().guide) screenHome(); else screenSplash();
    });
    header.appendChild(logo);
    renderAccount();
  }

  // The signed-in player's chip (avatar + sign out). Only shows when signed in.
  function renderAccount() {
    var box = document.getElementById("account");
    if (!box) return;
    clear(box);
    var user = DECODED.auth.getUser();
    if (!user) { box.hidden = true; return; }
    box.hidden = false;

    var chip = el("button", "account-chip", null, {
      type: "button",
      title: "Signed in as " + user.name + ". Click to sign out.",
      "aria-label": "Signed in as " + user.name + ". Click to sign out."
    });
    var avatar = user.picture
      ? '<img class="account-avatar" src="' + user.picture + '" alt="" referrerpolicy="no-referrer">'
      : '<span class="account-avatar account-initial">' + (user.firstName || "?").charAt(0).toUpperCase() + '</span>';
    chip.innerHTML = avatar + '<span class="account-name">' + user.firstName + '</span>';
    chip.addEventListener("click", function () {
      if (confirm("Sign out of Decoded?")) {
        DECODED.auth.signOut();
        renderHeader();
        updateHud();
        if (DECODED.auth.isRequired()) screenSignIn();
        else if (S.get().guide) screenHome();
        else screenSplash();
      }
    });
    box.appendChild(chip);
  }

  /* ------------------------------ Sign in ------------------------------- */
  function screenSignIn() {
    clear(root);
    hud.hidden = true;
    var box = document.getElementById("account");
    if (box) { clear(box); box.hidden = true; }

    var name = DECODED.config.BRAND.productName;
    var wrap = el("div", "screen-center fade-up");
    wrap.innerHTML =
      '<div class="hero-mascot">' + DECODED.mascotSVG("ada", { size: 160, animate: !DECODED.reducedMotion() }) + '</div>' +
      '<h1 class="wordmark glitch" data-text="' + name + '">' + name + '</h1>' +
      '<div class="wordmark-sub">' + DECODED.config.BRAND.tagline + '</div>' +
      '<p class="lead">Create your free account to start playing. Your progress is saved to you.</p>';

    var btnWrap = el("div", "auth-btn-wrap");
    btnWrap.innerHTML = '<div class="auth-loading">Loading sign-in...</div>';
    wrap.appendChild(btnWrap);

    wrap.appendChild(el("p", "auth-note",
      "We use Google so you never need another password. We only see your name and email, and only use them to save your progress."));

    root.appendChild(wrap);

    DECODED.auth.renderButton(btnWrap, function () {
      enterGame();
    });
  }

  /* -------------------------------- HUD --------------------------------- */
  function updateHud() {
    var st = S.get();
    if (!st.guide) { hud.hidden = true; return; }
    hud.hidden = false;
    clear(hud);
    hud.appendChild(el("span", "hud-item", ic("star") + st.score, { title: "Score" }));
    if (st.streak >= 2) {
      hud.appendChild(el("span", "hud-item flame", ic("fire-flame") + st.streak, { title: "Streak" }));
    }
    hud.appendChild(el("span", "hud-item", ic("check-circle") + st.completed.length + " / " + DECODED.levels.length, { title: "Levels done" }));
  }

  /* --------------------- Per-level scoring context ---------------------- */
  function makeContext(level, onFinish) {
    return {
      correct: function (basePoints, anchorEl) {
        var streak = S.bumpStreak();
        var pts = streak >= 3 ? Math.round(basePoints * 1.5) : basePoints;
        S.addScore(pts);
        DECODED.floatPoints("+" + pts, anchorEl);
        updateHud();
        return pts;
      },
      wrong: function () {
        S.resetStreak();
        updateHud();
      },
      award: function (points, anchorEl) {
        S.addScore(points);
        DECODED.floatPoints("+" + points, anchorEl);
        updateHud();
      },
      // result is optional: { correct, total }. Used to decide pass/fail.
      finish: function (result) { onFinish(result); }
    };
  }

  /* ------------------------------ Splash -------------------------------- */
  function screenSplash() {
    clear(root);
    hud.hidden = true;
    var wrap = el("div", "screen-center fade-up");
    wrap.innerHTML =
      '<div class="hero-mascot">' + DECODED.mascotSVG("ada", { size: 180, animate: !DECODED.reducedMotion() }) + '</div>' +
      '<h1 class="wordmark glitch" data-text="' + DECODED.config.BRAND.productName + '">' + DECODED.config.BRAND.productName + '</h1>' +
      '<div class="wordmark-sub">' + DECODED.config.BRAND.tagline + '</div>' +
      '<p class="lead">' + DECODED.copy.splashIntro + '</p>';
    var start = el("button", "btn primary big", "Start", { type: "button" });
    start.addEventListener("click", screenGuidePicker);
    wrap.appendChild(start);
    root.appendChild(wrap);
    start.focus();
  }

  /* --------------------------- Guide picker ----------------------------- */
  function screenGuidePicker() {
    clear(root);
    hud.hidden = true;
    var selected = S.get().guide || null;

    var wrap = el("div", "screen-pad fade-up");
    wrap.appendChild(el("h2", "screen-title", DECODED.copy.guidePickTitle));
    wrap.appendChild(el("p", "screen-sub", DECODED.copy.guidePickSub));

    var cards = el("div", "guide-cards");
    ["ada", "leo"].forEach(function (id) {
      var g = DECODED.guides[id];
      var card = el("button", "guide-card" + (selected === id ? " selected" : ""), null, {
        type: "button", "aria-pressed": selected === id ? "true" : "false"
      });
      card.innerHTML =
        '<div class="guide-mascot">' + DECODED.mascotSVG(id, { size: 130, animate: !DECODED.reducedMotion() }) + '</div>' +
        '<div class="guide-name" style="color:' + g.color + '">' + g.name + '</div>' +
        '<div class="guide-pers">' + g.personality + '</div>';
      card.addEventListener("click", function () {
        selected = id;
        var all = cards.querySelectorAll(".guide-card");
        for (var k = 0; k < all.length; k++) {
          all[k].classList.remove("selected");
          all[k].setAttribute("aria-pressed", "false");
        }
        card.classList.add("selected");
        card.setAttribute("aria-pressed", "true");
        go.disabled = false;
      });
      cards.appendChild(card);
    });
    wrap.appendChild(cards);

    var go = el("button", "btn primary big", "Let's go", { type: "button" });
    go.disabled = !selected;
    go.addEventListener("click", function () {
      if (!selected) return;
      S.setGuide(selected);
      updateHud();
      screenHome();
    });
    wrap.appendChild(go);
    root.appendChild(wrap);
  }

  /* ----------------------------- Home map ------------------------------- */
  function screenHome() {
    clear(root);
    updateHud();
    var st = S.get();
    var guide = DECODED.guides[st.guide] || DECODED.guides.ada;

    var wrap = el("div", "screen-pad fade-up");

    // Hero panel: mascot + speech bubble
    var hero = el("div", "home-hero");
    hero.innerHTML =
      '<div class="hero-mascot small" style="--gc:' + guide.color + '">' +
        DECODED.mascotSVG(guide.id, { size: 120, animate: !DECODED.reducedMotion() }) + '</div>' +
      '<div class="speech" style="--gc:' + guide.color + '">' + bubbleForProgress(st, guide) + '</div>';
    wrap.appendChild(hero);

    // XP / knowledge bar
    var rank = DECODED.rankForScore(st.score);
    var pct = Math.min(100, Math.round((st.score / DECODED.XP_TARGET) * 100));
    var xp = el("div", "xp-panel");
    xp.innerHTML =
      '<div class="xp-top"><span class="rank-pill" style="--gc:' + guide.color + '">' + ic(rank.icon) + rank.name + '</span>' +
      '<span class="xp-score">' + st.score + ' / ' + DECODED.XP_TARGET + ' XP</span></div>' +
      '<div class="meter-track"><span class="meter-fill" style="width:' + pct + '%"></span></div>';
    wrap.appendChild(xp);

    // Toolbar
    var bar = el("div", "home-bar");
    var lbBtn = el("button", "btn ghost", ic("trophy") + "Leaderboard", { type: "button" });
    lbBtn.addEventListener("click", screenLeaderboard);
    var switchBtn = el("button", "link-btn", "Switch guide", { type: "button" });
    switchBtn.addEventListener("click", screenGuidePicker);
    bar.appendChild(lbBtn);
    bar.appendChild(switchBtn);
    wrap.appendChild(bar);

    // Levels grouped by chapter
    DECODED.chapters.forEach(function (ch) {
      var levels = DECODED.levels.filter(function (l) { return l.chapter === ch.id; });
      if (!levels.length) return;
      wrap.appendChild(el("h3", "chapter-title", ch.name));
      var list = el("div", "level-list");
      levels.forEach(function (lv) {
        list.appendChild(levelRow(lv));
      });
      wrap.appendChild(list);
    });

    // Certificate access once all done
    if (st.completed.length === DECODED.levels.length) {
      var certBtn = el("button", "btn primary big", ic("trophy", 20) + "View your certificate", { type: "button" });
      certBtn.addEventListener("click", screenCertificate);
      wrap.appendChild(certBtn);
    }

    root.appendChild(wrap);
  }

  function bubbleForProgress(st, guide) {
    if (st.completed.length === 0) return guide.intro;
    if (st.completed.length === DECODED.levels.length) return "You did it. All 11 decoded. Go grab your certificate.";
    var next = nextLevelNum(st);
    return "Nice work so far. Level " + next + " is ready when you are.";
  }

  function nextLevelNum(st) {
    for (var i = 1; i <= DECODED.levels.length; i++) {
      if (!S.isCompleted(i)) return i;
    }
    return DECODED.levels.length;
  }

  function levelRow(lv) {
    var unlocked = S.isUnlocked(lv.num);
    var done = S.isCompleted(lv.num);
    var stateLabel = done ? "DONE" : (unlocked ? "PLAY" : "LOCKED");
    var cls = "level-row " + (done ? "done" : unlocked ? "open" : "locked");

    var row = el("button", cls, null, {
      type: "button",
      "aria-label": "Level " + lv.num + ", " + lv.title + ", " + stateLabel
    });
    row.innerHTML =
      '<span class="lv-num">' + lv.num + '</span>' +
      '<span class="lv-main"><span class="lv-title">' + lv.title + '</span>' +
      '<span class="lv-tag">' + lv.tag + '</span></span>' +
      '<span class="lv-state">' + (done ? ic("check-circle") + "DONE" : unlocked ? ic("play") + "PLAY" : ic("lock") + "LOCKED") + '</span>';

    if (unlocked) row.addEventListener("click", function () { screenLevel(lv.num); });
    else row.disabled = true;
    return row;
  }

  /* ------------------------------ Level --------------------------------- */
  function screenLevel(num) {
    var lv = DECODED.levelByNum(num);
    if (!lv || !S.isUnlocked(num)) { screenHome(); return; }
    clear(root);
    updateHud();
    var guide = DECODED.guides[S.get().guide] || DECODED.guides.ada;

    var wrap = el("div", "screen-pad level-screen fade-up");

    var top = el("div", "level-top");
    var back = el("button", "link-btn", ic("arrow-left") + "Back to map", { type: "button" });
    back.addEventListener("click", screenHome);
    top.appendChild(back);
    top.appendChild(el("span", "level-counter", "Level " + lv.num + " of " + DECODED.levels.length));
    wrap.appendChild(top);

    wrap.appendChild(el("h2", "level-title", lv.title));

    // Guide intro line
    var intro = el("div", "guide-line", null);
    intro.innerHTML = '<span class="gl-mascot">' +
      DECODED.mascotSVG(guide.id, { size: 44, animate: !DECODED.reducedMotion() }) + '</span>' +
      '<span class="gl-text" style="--gc:' + guide.color + '">' + lv.intro + '</span>';
    wrap.appendChild(intro);

    // How-to-play callout
    wrap.appendChild(el("div", "howto", '<span class="howto-ic">' + icon("nav-arrow-right") + '</span>' + lv.howToPlay));

    // Mini-game host
    var host = el("div", "game-host");
    wrap.appendChild(host);
    root.appendChild(wrap);
    window.scrollTo(0, 0);

    var ctx = makeContext(lv, function (result) { screenReveal(lv, result); });
    var mechanic = DECODED.mechanics[lv.mechanic];
    if (mechanic) mechanic(lv, host, ctx);
    else host.appendChild(el("div", "card", "This level type is not available."));
  }

  /* ------------------------------ Reveal -------------------------------- */
  // A level is passed when the player got MORE than half the questions right.
  // 50% and below counts as a fail, and the player is offered a retry.
  function passedLevel(result) {
    if (!result || !result.total) return true; // levels without scored questions always pass
    return (result.correct / result.total) > 0.5;
  }

  function screenReveal(lv, result) {
    if (!passedLevel(result)) { screenFailed(lv, result); return; }

    S.completeLevel(lv.num, lv.glossaryId);
    updateHud();
    DECODED.confetti();

    clear(root);
    var glossary = DECODED.glossaryById(lv.glossaryId);
    var isLast = lv.num === DECODED.levels.length;

    var wrap = el("div", "screen-pad fade-up");
    wrap.appendChild(el("div", "reveal-badge", "Level " + lv.num + " complete"));

    // Reveal: what just happened
    var reveal = el("div", "card reveal-card");
    reveal.innerHTML = '<div class="reveal-title">' + ic("light-bulb", 20) + lv.reveal.title + '</div>' +
      '<p class="reveal-body">' + lv.reveal.body + '</p>';
    wrap.appendChild(reveal);

    // Concept unlocked
    var concept = el("div", "card concept-card pop-in");
    concept.innerHTML =
      '<div class="concept-tag">' + ic("sparks") + 'Concept Unlocked</div>' +
      '<div class="concept-term">' + ic(glossary.icon, 22) + glossary.term + '</div>' +
      '<div class="concept-def">' + glossary.definition + '</div>';
    wrap.appendChild(concept);

    // Try this: a realistic assignment to test understanding for real
    if (lv.assignment) {
      var task = el("div", "card assignment-card pop-in");
      task.innerHTML =
        '<div class="assignment-tag">' + ic("task-list") + 'Try this in real life</div>' +
        '<p class="assignment-body">' + lv.assignment + '</p>';
      wrap.appendChild(task);
    }

    // CTA only on the last level
    if (isLast) wrap.appendChild(ctaBlock());

    // Navigation
    var nav = el("div", "reveal-nav");
    if (!isLast) {
      var nextNum = lv.num + 1;
      var nextBtn = el("button", "btn primary", "Next level" + ic2("nav-arrow-right"), { type: "button" });
      nextBtn.addEventListener("click", function () { screenLevel(nextNum); });
      nav.appendChild(nextBtn);
    } else {
      var certBtn = el("button", "btn primary", ic("trophy", 20) + "See your certificate", { type: "button" });
      certBtn.addEventListener("click", screenCertificate);
      nav.appendChild(certBtn);
    }
    var mapBtn = el("button", "btn ghost", "Back to map", { type: "button" });
    mapBtn.addEventListener("click", screenHome);
    nav.appendChild(mapBtn);
    wrap.appendChild(nav);

    root.appendChild(wrap);
    window.scrollTo(0, 0);
  }

  /* ---------------------- Failed a level (retry) ------------------------ */
  function screenFailed(lv, result) {
    // Do NOT complete the level: the concept stays locked until they pass.
    clear(root);
    var wrap = el("div", "screen-pad fade-up");
    wrap.appendChild(el("div", "reveal-badge fail", "Level " + lv.num + " not passed"));

    var panel = el("div", "card fail-card");
    panel.innerHTML =
      '<div class="fail-title">' + ic("refresh-double", 20) + "Give it another go</div>" +
      '<p class="fail-body">You got ' + result.correct + " of " + result.total +
      " right. You need more than half to pass and unlock this concept. Take another run at it, the explanation below will help.</p>";
    wrap.appendChild(panel);

    // Still teach the idea so the retry goes better.
    var reveal = el("div", "card reveal-card");
    reveal.innerHTML = '<div class="reveal-title">' + ic("light-bulb", 20) + lv.reveal.title + '</div>' +
      '<p class="reveal-body">' + lv.reveal.body + '</p>';
    wrap.appendChild(reveal);

    var nav = el("div", "reveal-nav");
    var retry = el("button", "btn primary", ic("refresh-double", 18) + "Retry Level", { type: "button" });
    retry.addEventListener("click", function () { screenLevel(lv.num); });
    nav.appendChild(retry);
    var mapBtn = el("button", "btn ghost", "Back to map", { type: "button" });
    mapBtn.addEventListener("click", screenHome);
    nav.appendChild(mapBtn);
    wrap.appendChild(nav);

    root.appendChild(wrap);
    window.scrollTo(0, 0);
  }

  function ctaBlock() {
    var block = el("div", "card cta-card");
    block.innerHTML = '<p class="cta-text">' + DECODED.config.CTA.text + '</p>';
    var btn = el("a", "btn primary", DECODED.config.CTA.buttonLabel, {
      href: DECODED.config.CTA.href, target: "_blank", rel: "noopener"
    });
    block.appendChild(btn);
    return block;
  }

  /* ---------------------------- Certificate ----------------------------- */
  function screenCertificate() {
    clear(root);
    S.markCertificateSeen();
    var st = S.get();
    var guide = DECODED.guides[st.guide] || DECODED.guides.ada;
    var rank = DECODED.rankForScore(st.score);

    var wrap = el("div", "screen-pad fade-up");

    var cert = el("div", "card cert-card", null, { style: "--gc:" + guide.color });
    cert.innerHTML =
      '<div class="cert-mascot">' + DECODED.mascotSVG(guide.id, { size: 140, animate: !DECODED.reducedMotion() }) + '</div>' +
      '<h2 class="cert-title">' + DECODED.copy.certTitle + '</h2>' +
      '<div class="cert-stats">' +
        '<div class="cert-stat"><span class="cs-num">' + st.score + '</span><span class="cs-lab">' + ic("star") + 'Score</span></div>' +
        '<div class="cert-stat"><span class="cs-num">' + rank.name + '</span><span class="cs-lab">' + ic("trophy") + 'Rank</span></div>' +
        '<div class="cert-stat"><span class="cs-num">' + st.bestStreak + '</span><span class="cs-lab">' + ic("fire-flame") + 'Best streak</span></div>' +
      '</div>';
    wrap.appendChild(cert);

    // Concept pills row
    var pills = el("div", "concept-pills");
    DECODED.glossary.forEach(function (g) {
      pills.appendChild(el("span", "concept-pill", ic(g.icon) + g.term));
    });
    wrap.appendChild(el("h3", "chapter-title", "Concepts you unlocked"));
    wrap.appendChild(pills);

    // Full concept deck
    var deck = el("div", "concept-deck");
    DECODED.glossary.forEach(function (g) {
      var c = el("div", "card mini-concept");
      c.innerHTML = '<div class="concept-term">' + ic(g.icon, 20) + g.term + '</div>' +
        '<div class="concept-def">' + g.definition + '</div>';
      deck.appendChild(c);
    });
    wrap.appendChild(deck);

    // Share card + email capture + CTA
    wrap.appendChild(shareBlock(st, guide, rank));
    wrap.appendChild(emailBlock(st, rank));
    wrap.appendChild(ctaBlock());

    // Leaderboard entry + replay/reset
    var lbBtn = el("button", "btn ghost", ic("trophy") + "Add your score to the leaderboard", { type: "button" });
    lbBtn.addEventListener("click", function () { screenLeaderboard(true); });
    wrap.appendChild(lbBtn);

    var endNav = el("div", "reveal-nav");
    var replay = el("button", "btn ghost", ic("refresh-double") + "Replay", { type: "button" });
    replay.addEventListener("click", screenHome);
    var reset = el("button", "btn danger", "Reset progress", { type: "button" });
    reset.addEventListener("click", function () {
      if (confirm("Reset all your progress and score? This cannot be undone.")) {
        S.reset();
        applyTheme(S.get().theme);
        renderHeader();
        screenSplash();
        updateHud();
      }
    });
    endNav.appendChild(replay);
    endNav.appendChild(reset);
    wrap.appendChild(endNav);

    root.appendChild(wrap);
    window.scrollTo(0, 0);
  }

  /* ---------------------------- Share block ----------------------------- */
  function shareBlock(st, guide, rank) {
    var block = el("div", "card share-card");
    block.appendChild(el("h3", "block-title", ic("share-android", 20) + "Share your result"));
    var canvas = el("canvas", "share-preview");
    block.appendChild(canvas);

    var row = el("div", "share-actions");
    var dl = el("button", "btn primary", ic("download") + "Download image", { type: "button" });
    var sh = el("button", "btn ghost", ic("share-android") + "Share", { type: "button" });
    row.appendChild(dl);
    row.appendChild(sh);
    block.appendChild(row);

    DECODED.buildShareCard(canvas, { guide: guide.id, score: st.score, rank: rank.name }, function () {});

    var FILENAME = "decoded-result.png";

    dl.addEventListener("click", function () {
      DECODED.buildShareCard(canvas, { guide: guide.id, score: st.score, rank: rank.name }, function (cv) {
        saveImage(cv);
      });
    });

    sh.addEventListener("click", function () {
      DECODED.buildShareCard(canvas, { guide: guide.id, score: st.score, rank: rank.name }, function (cv) {
        if (!cv.toBlob) { saveImage(cv); return; }
        cv.toBlob(function (blob) {
          if (!blob) { saveImage(cv); return; }
          var file = new File([blob], FILENAME, { type: "image/png" });
          var shareData = {
            title: "Decoded",
            text: DECODED.copy.shareHeadline + " Play free at " + DECODED.config.SITE_URL_LABEL,
            url: DECODED.config.SITE_URL
          };
          try {
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
              navigator.share({ title: shareData.title, text: shareData.text, files: [file] })
                .catch(function () { saveImage(cv, blob); });
            } else if (navigator.share) {
              navigator.share(shareData).catch(function () { saveImage(cv, blob); });
            } else {
              saveImage(cv, blob);
            }
          } catch (e) {
            saveImage(cv, blob);
          }
        }, "image/png");
      });
    });

    // Robust PNG saver: prefers a Blob object URL with an anchor that is actually
    // in the DOM (a detached anchor is ignored by many browsers), and falls back
    // to opening the image in a new tab so the player can save it manually.
    function saveImage(cv, blob) {
      function download(url, revoke) {
        var a = document.createElement("a");
        a.href = url;
        a.download = FILENAME;
        a.rel = "noopener";
        a.style.display = "none";
        document.body.appendChild(a);
        a.click();
        setTimeout(function () {
          if (a.parentNode) a.parentNode.removeChild(a);
          if (revoke) URL.revokeObjectURL(url);
        }, 1500);
      }
      function openInTab() {
        var url = cv.toDataURL("image/png");
        var w = window.open("", "_blank");
        if (w && w.document) {
          w.document.title = "Your Decoded result";
          w.document.body.style.margin = "0";
          w.document.body.style.background = "#0B0B0C";
          w.document.body.innerHTML =
            '<img src="' + url + '" alt="Your Decoded result. Long press or right click to save." ' +
            'style="display:block;max-width:100%;height:auto;margin:0 auto">';
        } else {
          download(url, false); // final attempt with a data URL
        }
      }
      try {
        if (blob) { download(URL.createObjectURL(blob), true); return; }
        if (cv.toBlob) {
          cv.toBlob(function (b) {
            if (b) download(URL.createObjectURL(b), true);
            else openInTab();
          }, "image/png");
        } else {
          openInTab();
        }
      } catch (e) {
        openInTab();
      }
    }

    return block;
  }

  /* ---------------------------- Email block ----------------------------- */
  function emailBlock(st, rank) {
    var block = el("div", "card email-card");
    block.innerHTML = '<h3 class="block-title">' + ic("mail", 20) + DECODED.copy.emailTitle + '</h3>' +
      '<p class="block-sub">' + DECODED.copy.emailSub + '</p>';

    var form = el("form", "email-form");
    var input = el("input", "email-input", null, {
      type: "email", placeholder: "you@email.com", "aria-label": "Your email address", required: "required"
    });
    var submit = el("button", "btn primary", DECODED.copy.emailButton, { type: "submit" });
    form.appendChild(input);
    form.appendChild(submit);
    block.appendChild(form);
    var msg = el("div", "email-msg", "", { "aria-live": "polite" });
    block.appendChild(msg);

    var user = DECODED.auth.getUser();
    if (st.email) input.value = st.email;
    else if (user && user.email) input.value = user.email;

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var email = input.value.trim();
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        msg.className = "email-msg bad";
        msg.textContent = "That email does not look right. Give it another go.";
        return;
      }
      S.setEmail(email);
      submit.disabled = true;
      submit.textContent = "Sending...";

      var payload = { email: email, score: st.score, rank: rank.name };
      var endpoint = DECODED.config.FORM_ENDPOINT;

      function done() {
        msg.className = "email-msg good";
        msg.textContent = DECODED.copy.emailSuccess;
        submit.textContent = "Sent";
      }

      if (endpoint) {
        fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify(payload)
        }).then(done).catch(function () {
          // Even if the network fails, the email is stored locally.
          done();
        });
      } else {
        done();
      }
    });

    return block;
  }

  /* --------------------------- Leaderboard ------------------------------ */
  function screenLeaderboard(fromCert) {
    clear(root);
    var st = S.get();
    var wrap = el("div", "screen-pad fade-up");

    var top = el("div", "level-top");
    var back = el("button", "link-btn", ic("arrow-left") + (fromCert ? "Back to certificate" : "Back to map"), { type: "button" });
    back.addEventListener("click", function () { if (fromCert) screenCertificate(); else screenHome(); });
    top.appendChild(back);
    wrap.appendChild(top);

    wrap.appendChild(el("h2", "screen-title", ic("trophy", 24) + "Leaderboard"));

    var listWrap = el("div", "lb-list");
    wrap.appendChild(listWrap);

    function draw(list) {
      clear(listWrap);
      list.forEach(function (entry, idx) {
        var rankNum = idx + 1;
        var cls = "lb-row" + (rankNum <= 3 ? " top top-" + rankNum : "") + (entry.you ? " you" : "");
        var medal = rankNum <= 3 ? icon("trophy", { size: 20 }) : rankNum;
        var row = el("div", cls);
        row.innerHTML = '<span class="lb-rank">' + medal + '</span>' +
          '<span class="lb-initials">' + entry.initials + (entry.you ? " (you)" : "") + '</span>' +
          '<span class="lb-score">' + entry.score + '</span>';
        listWrap.appendChild(row);
      });
    }
    draw(DECODED.leaderboard.fetch());

    // Add-your-score flow
    var add = el("div", "card lb-add");
    add.innerHTML = '<div class="block-title">Add your score: ' + st.score + '</div>';
    var form = el("form", "lb-form");
    var input = el("input", "lb-initials-input", null, {
      type: "text", maxlength: "4", placeholder: "ABC", "aria-label": "Your initials, up to 4 letters"
    });
    var btn = el("button", "btn primary", "Add me", { type: "submit" });
    form.appendChild(input);
    form.appendChild(btn);
    add.appendChild(form);
    var addedMsg = el("div", "email-msg", "", { "aria-live": "polite" });
    add.appendChild(addedMsg);
    wrap.appendChild(add);

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var initials = input.value.trim();
      if (!initials) { addedMsg.className = "email-msg bad"; addedMsg.textContent = "Add a couple letters first."; return; }
      var list = DECODED.leaderboard.add(initials, st.score);
      draw(list);
      btn.disabled = true;
      input.disabled = true;
      addedMsg.className = "email-msg good";
      addedMsg.textContent = "You're on the board.";
    });

    root.appendChild(wrap);
    window.scrollTo(0, 0);
  }

})();
</script>
